<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrukLink AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --dark: #0f172a;
            --sidebar-bg: #0b0f1a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* Login Screen */
        #auth-screen {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--border); padding: 50px; border-radius: 30px;
            text-align: center; width: 100%; max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }
        .logo-text { font-size: 3rem; font-weight: 800; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }

        /* App Layout */
        #app { display: flex; height: 100vh; }
        
        .sidebar { 
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 25px; 
        }

        .main-container { flex: 1; display: flex; flex-direction: column; background: var(--dark); }

        /* Sidebar Items */
        .nav-item { 
            padding: 12px 15px; border-radius: 12px; cursor: pointer; 
            display: flex; align-items: center; gap: 12px; transition: 0.2s; margin-bottom: 8px;
        }
        .nav-item:hover { background: var(--glass); }
        .nav-item.active { background: var(--primary); color: white; }

        /* Chat Workspace */
        .chat-display { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 25px; }
        
        .msg { max-width: 85%; line-height: 1.6; font-size: 1.05rem; }
        .msg.user { align-self: flex-end; color: #818cf8; font-weight: 600; text-align: right; }
        .msg.ai { 
            align-self: flex-start; background: var(--glass); padding: 20px; 
            border-radius: 20px; border: 1px solid var(--border); 
        }

        /* Input Area */
        .input-wrap { padding: 30px 15%; background: var(--dark); border-top: 1px solid var(--border); }
        .input-box { 
            background: var(--glass); border: 1px solid var(--border); padding: 15px 20px;
            border-radius: 18px; display: flex; align-items: center; gap: 15px;
        }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; }
        
        button.send-btn { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        button.send-btn:hover { transform: scale(1.1); background: #4f46e5; }

        .google-btn { 
            width: 100%; padding: 14px; background: white; color: black; 
            border-radius: 12px; font-weight: bold; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px;
        }

        /* Responsive */
        @media (max-width: 850px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .nav-text, .sidebar-header { display: none; }
            .chat-display, .input-wrap { padding: 20px 5%; }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="login-card">
            <div class="logo-text">DrukLink</div>
            <p style="color: #94a3b8; margin-bottom: 20px;">Your intelligent companion, la.</p>
            <button class="google-btn" onclick="login()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
                Sign in with Google
            </button>
        </div>
    </div>

    <div id="app" class="hidden">
        <aside class="sidebar">
            <div class="sidebar-header" style="font-weight: 800; font-size: 1.4rem; margin-bottom: 40px; color: var(--primary);">DL.AI</div>
            <nav>
                <div class="nav-item active"><i class="fas fa-comment-dots"></i> <span class="nav-text">Chat</span></div>
                <div class="nav-item"><i class="fas fa-history"></i> <span class="nav-text">History</span></div>
                <div class="nav-item"><i class="fas fa-cog"></i> <span class="nav-text">Settings</span></div>
            </nav>
            
            <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border);">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 15px;">
                    <img id="u-pic" style="width: 35px; border-radius: 50%;">
                    <span id="u-name" style="font-size: 0.9rem; font-weight: 500;" class="nav-text"></span>
                </div>
                <button onclick="logout()" style="width: 100%; background: #ef4444; border: none; padding: 10px; border-radius: 10px; color: white; cursor: pointer; font-weight: bold;">Logout</button>
            </div>
        </aside>

        <main class="main-container">
            <div class="chat-display" id="chat-feed">
                <div class="msg ai">
                    <strong>Kuzuzangpo la!</strong> <br>
                    I am DrukLink AI. Ask me anything, or let's just have a chat. How can I help you today?
                </div>
            </div>

            <div class="input-wrap">
                <div class="input-box">
                    <input type="text" id="userInput" placeholder="Message DrukLink AI..." onkeypress="if(event.key === 'Enter') sendMsg()">
                    <button class="send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxPbybzZwn1GbzwMqJ-6zRyI7TRSKvgs0",
            authDomain: "druklink-24fa1.firebaseapp.com",
            projectId: "druklink-24fa1",
            storageBucket: "druklink-24fa1.firebasestorage.app",
            messagingSenderId: "183615496366",
            appId: "1:183615496366:web:fcfb4f88f3223044924d3f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('u-pic').src = user.photoURL;
                document.getElementById('u-name').innerText = user.displayName;
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app').classList.add('hidden');
            }
        });

        window.sendMsg = () => {
            const input = document.getElementById('userInput');
            const feed = document.getElementById('chat-feed');
            const val = input.value.trim();

            if (!val) return;

            // User Message
            feed.innerHTML += `<div class="msg user">${val}</div>`;
            input.value = "";
            feed.scrollTop = feed.scrollHeight;

            // AI Response (Simulation)
            setTimeout(() => {
                feed.innerHTML += `
                    <div class="msg ai">
                        <strong>DrukLink AI:</strong><br>
                        I understand, la. You mentioned "${val}". Is there anything specific you would like me to explain further?
                    </div>`;
                feed.scrollTop = feed.scrollHeight;
            }, 1000);
        };
    </script>
</body>
</html>
