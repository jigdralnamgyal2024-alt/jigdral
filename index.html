<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrukLink AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* Login Page Styling */
        #auth-screen {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid var(--border); padding: 40px; border-radius: 24px;
            text-align: center; width: 100%; max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .ai-logo { font-size: 3rem; margin-bottom: 10px; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        
        /* Dashboard Layout */
        #app { display: flex; height: 100vh; }
        .sidebar { width: 260px; border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; background: #0b0f1a; }
        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        .nav-item { padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; margin-bottom: 5px; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover { background: var(--glass); }
        .nav-item.active { background: var(--primary); color: white; }

        /* Research Interface */
        .chat-area { flex: 1; overflow-y: auto; padding: 40px 20%; }
        .msg { margin-bottom: 30px; line-height: 1.6; }
        .msg.user { color: #818cf8; font-weight: 600; }
        .msg.ai { background: var(--glass); padding: 20px; border-radius: 16px; border-left: 4px solid var(--primary); }

        .input-container { padding: 30px 20%; border-top: 1px solid var(--border); background: var(--dark); }
        .input-box { 
            background: var(--glass); border: 1px solid var(--border); 
            border-radius: 16px; padding: 15px; display: flex; gap: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        input { background: transparent; border: none; color: white; flex: 1; outline: none; font-size: 1rem; }
        
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .google-btn { width: 100%; margin-top: 20px; background: white; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* Animation */
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="login-card">
            <div class="ai-logo">DrukLink AI</div>
            <p style="color: #94a3b8; margin-bottom: 30px;">Your Smart Research Partner in Bhutan.</p>
            <button class="google-btn" onclick="login()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
                Sign in with Google
            </button>
        </div>
    </div>

    <div id="app" class="hidden">
        <aside class="sidebar">
            <div class="ai-logo" style="font-size: 1.5rem; margin-bottom: 40px;">DL.AI</div>
            <div class="nav-links">
                <div class="nav-item active"><i class="fas fa-plus"></i> New Research</div>
                <div class="nav-item"><i class="fas fa-history"></i> History</div>
                <div class="nav-item"><i class="fas fa-book"></i> Library</div>
            </div>
            <div class="user-profile" style="margin-top: auto; border-top: 1px solid var(--border); padding-top: 20px;">
                <div id="user-info" style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                    <img id="u-pic" style="width: 35px; border-radius: 50%;">
                    <span id="u-name" style="font-size: 0.9rem; font-weight: 500;"></span>
                </div>
                <button onclick="logout()" style="width: 100%; background: #ef4444; font-size: 0.8rem;">Logout</button>
            </div>
        </aside>

        <main class="main-chat">
            <div class="chat-area" id="chat-feed">
                <div class="msg ai">
                    <strong>Kuzuzangpo la!</strong> I am your DrukLink AI Research Assistant. <br><br>
                    I can help you with:
                    <ul style="margin-left: 20px; margin-top: 10px;">
                        <li>Complex scientific research</li>
                        <li>Data analysis</li>
                        <li>Bhutanese history and culture insights</li>
                        <li>Academic writing & coding</li>
                    </ul>
                </div>
            </div>

            <div class="input-container">
                <div class="input-box">
                    <input type="text" id="userInput" placeholder="Ask anything, la..." onkeypress="if(event.key === 'Enter') sendQuery()">
                    <button onclick="sendQuery()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCxPbybzZwn1GbzwMqJ-6zRyI7TRSKvgs0",
            authDomain: "druklink-24fa1.firebaseapp.com",
            projectId: "druklink-24fa1",
            storageBucket: "druklink-24fa1.firebasestorage.app",
            messagingSenderId: "183615496366",
            appId: "1:183615496366:web:fcfb4f88f3223044924d3f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('u-pic').src = user.photoURL;
                document.getElementById('u-name').innerText = user.displayName;
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app').classList.add('hidden');
            }
        });

        window.sendQuery = () => {
            const input = document.getElementById('userInput');
            const feed = document.getElementById('chat-feed');
            
            if (!input.value.trim()) return;

            // Add User Message
            feed.innerHTML += `<div class="msg user">You: ${input.value}</div>`;
            
            // Add Loading State
            const loaderId = 'load-' + Date.now();
            feed.innerHTML += `<div class="msg ai pulse" id="${loaderId}">Thinking...</div>`;
            
            const query = input.value;
            input.value = "";
            feed.scrollTop = feed.scrollHeight;

            // Simulate AI Response (In a real app, you would connect to OpenAI/Gemini API here)
            setTimeout(() => {
                const loader = document.getElementById(loaderId);
                loader.classList.remove('pulse');
                loader.innerHTML = `<strong>DrukLink AI:</strong><br>For your research on "${query}", I found that the core elements involve deep analysis and systematic investigation. <br><br>As an AI, I suggest looking into peer-reviewed journals for more data, la. How else can I assist you today?`;
                feed.scrollTop = feed.scrollHeight;
            }, 1500);
        };
    </script>
</body>
</html>
