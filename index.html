<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrukLink | Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS Reset & Variables */
        :root {
            --bg-color: #fafafa;
            --border-color: #dbdbdb;
            --text-dark: #262626;
            --primary-blue: #0095f6;
            --primary-blue-hover: #1877f2;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); display: flex; height: 100vh; overflow: hidden; }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100vh; background: white; z-index: 100; position: absolute; top: 0; left: 0;
        }
        .login-box {
            border: 1px solid var(--border-color); padding: 40px; text-align: center; background: white; width: 350px;
        }
        .login-box h1 { font-family: 'Brush Script MT', cursive; font-size: 2.5rem; margin-bottom: 30px; }
        .login-box input {
            width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border-color); border-radius: 3px; background: #fafafa;
        }
        .login-box button {
            width: 100%; padding: 10px; background: var(--primary-blue); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
        }
        .login-box button:hover { background: var(--primary-blue-hover); }

        /* --- MAIN APP SCREEN --- */
        #app-screen { display: none; width: 100%; display: flex; }

        /* Sidebar Navigation */
        .sidebar {
            width: 250px; border-right: 1px solid var(--border-color); background: white; padding: 20px 10px; display: flex; flex-direction: column;
        }
        .sidebar h2 { font-family: 'Brush Script MT', cursive; font-size: 2rem; padding-left: 10px; margin-bottom: 30px; }
        .nav-item {
            display: flex; align-items: center; padding: 15px 10px; margin-bottom: 5px; cursor: pointer; border-radius: 8px; transition: background 0.2s;
        }
        .nav-item:hover { background: #f2f2f2; }
        .nav-item i { font-size: 1.5rem; margin-right: 15px; }
        .nav-item span { font-size: 1.1rem; }

        /* Main Feed Area */
        .main-content {
            flex: 1; overflow-y: auto; display: flex; justify-content: center; padding-top: 30px;
        }
        .feed { width: 470px; max-width: 100%; }

        /* Create Post Container */
        .create-post { background: white; border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .create-post textarea { width: 100%; border: none; resize: none; outline: none; margin-bottom: 10px; }
        .create-post .actions { display: flex; justify-content: space-between; align-items: center; }
        .create-post button { background: var(--primary-blue); color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;}

        /* Post Card */
        .post { background: white; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 20px; }
        .post-header { display: flex; align-items: center; padding: 10px 15px; }
        .post-header img { width: 32px; height: 32px; border-radius: 50%; margin-right: 10px; }
        .post-header font { font-weight: bold; }
        .post-image { width: 100%; height: auto; }
        .post-actions { padding: 10px 15px; display: flex; gap: 15px; font-size: 1.5rem; }
        .post-actions i { cursor: pointer; }
        .post-actions i:hover { color: gray; }
        .post-caption { padding: 0 15px 15px 15px; }
        
        /* Utility */
        .hidden { display: none !important; }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .sidebar span { display: none; }
            .sidebar h2 { display: none; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>DrukLink</h1>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button onclick="handleLogin()">Log In / Sign Up</button>
            <p style="margin-top: 15px; font-size: 0.8rem; color: gray;">
                (For this prototype, clicking Login bypasses auth to show the UI)
            </p>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        
        <div class="sidebar">
            <h2>DrukLink</h2>
            <div class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></div>
            <div class="nav-item"><i class="fa-solid fa-magnifying-glass"></i><span>Search</span></div>
            <div class="nav-item"><i class="fa-regular fa-compass"></i><span>Explore</span></div>
            <div class="nav-item"><i class="fa-solid fa-clapperboard"></i><span>Reels</span></div>
            <div class="nav-item"><i class="fa-regular fa-paper-plane"></i><span>Messages</span></div>
            <div class="nav-item"><i class="fa-regular fa-heart"></i><span>Notifications</span></div>
            <div class="nav-item"><i class="fa-solid fa-plus"></i><span>Create</span></div>
            <div class="nav-item" style="color: #00c853;"><i class="fa-solid fa-star"></i><span>Close Friends</span></div>
            <div class="nav-item" onclick="handleLogout()"><i class="fa-solid fa-arrow-right-from-bracket"></i><span>Log Out</span></div>
        </div>

        <div class="main-content">
            <div class="feed">
                
                <div class="create-post">
                    <textarea id="post-text" placeholder="What's on your mind?"></textarea>
                    <div class="actions">
                        <input type="file" id="image-upload" accept="image/*" style="display: none;">
                        <label for="image-upload" style="cursor: pointer; color: var(--primary-blue);">
                            <i class="fa-regular fa-image"></i> Add Photo
                        </label>
                        <button onclick="uploadPost()">Post</button>
                    </div>
                </div>

                <div class="post">
                    <div class="post-header">
                        <img src="https://ui-avatars.com/api/?name=User+One" alt="Profile">
                        <span><strong>user_one</strong></span>
                    </div>
                    <img class="post-image" src="https://images.unsplash.com/photo-1611162617474-5b21e879e113?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Post">
                    <div class="post-actions">
                        <i class="fa-regular fa-heart"></i>
                        <i class="fa-regular fa-comment"></i>
                        <i class="fa-regular fa-paper-plane"></i>
                    </div>
                    <div class="post-caption">
                        <strong>user_one</strong> Loving the new DrukLink platform! 🚀
                    </div>
                </div>

                <div id="dynamic-feed"></div>

            </div>
        </div>
    </div>

    <script type="module">
        // 1. Firebase Initialization
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
        // Import Auth and Firestore to make it "real"
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxPbybzZwn1GbzwMqJ-6zRyI7TRSKvgs0",
            authDomain: "druklink-24fa1.firebaseapp.com",
            projectId: "druklink-24fa1",
            storageBucket: "druklink-24fa1.firebasestorage.app",
            messagingSenderId: "183615496366",
            appId: "1:183615496366:web:fcfb4f88f3223044924d3f",
            measurementId: "G-R8JKT9DE48"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 2. Global API Keys
        const IMG_HIPPO_API_KEY = "b5f2098fa836fe7090138a418d294866";

        // 3. UI Toggle Functions (Attached to Window for inline HTML calling)
        window.handleLogin = function() {
            // In a real app, you would use:
            // signInWithEmailAndPassword(auth, email, password)
            
            // For UI Demonstration:
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
        };

        window.handleLogout = function() {
            // auth.signOut();
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        };

        // 4. ImgHippo Upload & Post Creation Logic
        window.uploadPost = async function() {
            const text = document.getElementById('post-text').value;
            const fileInput = document.getElementById('image-upload');
            
            if(!text && fileInput.files.length === 0) return alert("Please add text or an image.");

            let imageUrl = "";

            // Upload image to ImgHippo if file is selected
            if(fileInput.files.length > 0) {
                const formData = new FormData();
                formData.append('api_key', IMG_HIPPO_API_KEY);
                formData.append('file', fileInput.files[0]);

                try {
                    // NOTE: This uses ImgHippo's standard POST structure.
                    const response = await fetch('https://api.imghippo.com/v1/upload', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    if(data.success) {
                        imageUrl = data.data.url;
                    } else {
                        alert("Image upload failed.");
                        return;
                    }
                } catch (e) {
                    console.error("Upload error", e);
                }
            }

            // Generate the HTML for the new post
            const postHTML = `
                <div class="post">
                    <div class="post-header">
                        <img src="https://ui-avatars.com/api/?name=You" alt="Profile">
                        <span><strong>You</strong></span>
                    </div>
                    ${imageUrl ? `<img class="post-image" src="${imageUrl}" alt="Post">` : ''}
                    <div class="post-actions">
                        <i class="fa-regular fa-heart"></i>
                        <i class="fa-regular fa-comment"></i>
                        <i class="fa-regular fa-paper-plane"></i>
                    </div>
                    <div class="post-caption">
                        <strong>You</strong> ${text}
                    </div>
                </div>
            `;

            // Insert into feed
            document.getElementById('dynamic-feed').insertAdjacentHTML('afterbegin', postHTML);
            
            // Clear inputs
            document.getElementById('post-text').value = '';
            fileInput.value = '';

            /* // In a fully working backend setup, you would save this to Firestore:
            try {
                await addDoc(collection(db, "posts"), {
                    user: "You",
                    text: text,
                    imageUrl: imageUrl,
                    timestamp: new Date()
                });
            } catch (e) { console.error("Error adding document: ", e); }
            */
        }
    </script>
</body>
</html>
