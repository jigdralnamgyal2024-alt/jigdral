<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrukLink - Connect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #fafafa;
            --border-color: #dbdbdb;
            --text-color: #000000;
            --text-secondary: #737373;
            --blue-color: #0095f6;
            --blue-hover: #1877f2;
            --sidebar-hover: rgba(0, 0, 0, 0.05);
            --sidebar-width: 244px;
            --ig-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0; font-family: var(--ig-font);
        }

        body {
            background-color: var(--bg-color); color: var(--text-color); overflow: hidden;
        }

        button, input[type="submit"] { border: none; background: none; cursor: pointer; }
        .none { display: none !important; }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: var(--bg-color);
        }
        .login-box {
            border: 1px solid var(--border-color); padding: 50px 40px; text-align: center; background: white; width: 350px; border-radius: 1px;
        }
        .login-box h1 {
            font-family: 'Brush Script MT', cursive; font-size: 3.5rem; margin-bottom: 20px; font-weight: normal;
        }
        .google-btn {
            background-color: var(--blue-color); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 14px;
            display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; transition: background 0.2s;
        }
        .google-btn:hover { background-color: var(--blue-hover); }

        /* --- SIDEBAR --- */
        #app-screen { display: none; height: 100vh; }
        .sidebar {
            width: var(--sidebar-width); border-right: 1px solid var(--border-color); padding: 20px 12px; position: fixed; height: 100vh;
            background: white; display: flex; flex-direction: column; z-index: 100;
        }
        .sidebar-logo {
            font-family: 'Brush Script MT', cursive; font-size: 2rem; padding: 10px 12px; margin-bottom: 20px; cursor: pointer;
        }
        .nav-item {
            display: flex; align-items: center; padding: 12px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; transition: background 0.2s; font-size: 16px; position: relative;
        }
        .nav-item:hover { background: var(--sidebar-hover); }
        .nav-item.active-nav { font-weight: 700; }
        .nav-item.active-nav i { font-weight: 900; } /* Make icon solid if FontAwesome supports it */
        .nav-item i { font-size: 24px; margin-right: 16px; width: 24px; text-align: center; transition: transform 0.2s;}
        .nav-item:hover i { transform: scale(1.05); }
        .nav-item img.profile-pic-small { width: 24px; height: 24px; border-radius: 50%; margin-right: 16px; border: 1px solid var(--border-color); object-fit: cover;}
        
        /* Notification Badge */
        .notif-badge {
            background: #ff3040; color: white; font-size: 11px; font-weight: bold; height: 18px; min-width: 18px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center; padding: 0 5px; position: absolute; left: 24px; top: 6px; border: 2px solid white; display: none;
        }

        /* --- CONTENT AREA --- */
        .content-area {
            flex-grow: 1; margin-left: var(--sidebar-width); height: 100vh; display: flex; justify-content: center; padding: 30px 0; overflow-y: auto;
        }
        section { display: none; width: 100%; max-width: 470px; padding-bottom: 60px; }
        
        /* Section Specific Sizing */
        #profile-section { max-width: 935px; }
        #search-section, #notifications-section { max-width: 600px; padding: 20px; background: white; border: 1px solid var(--border-color); border-radius: 8px; margin-top: 20px; height: fit-content;}
        #messages-section {
            max-width: 935px; background: white; border: 1px solid var(--border-color); display: none; height: 85vh; border-radius: 4px; overflow: hidden; display: flex; flex-direction: row; padding: 0;
        }

        /* --- FEED POSTS --- */
        .post { background: white; margin-bottom: 24px; border-radius: 4px; border: 1px solid var(--border-color); }
        .post-header { display: flex; align-items: center; padding: 14px; }
        .post-header img { width: 32px; height: 32px; border-radius: 50%; margin-right: 12px; border: 1px solid var(--border-color); object-fit: cover; cursor: pointer;}
        .post-header .username { font-weight: 600; font-size: 14px; cursor: pointer; }
        .post-image img { width: 100%; display: block; object-fit: cover; cursor: pointer; }
        .post-actions { padding: 12px 14px 8px; display: flex; font-size: 24px; }
        .post-actions .action-icons { display: flex; gap: 16px; }
        .post-actions i { cursor: pointer; transition: color 0.1s; }
        .post-actions i.liked { color: #ed4956; animation: pop 0.2s; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .post-likes { padding: 0 14px; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
        .post-caption { padding: 0 14px; font-size: 14px; margin-bottom: 8px; }
        .post-caption .username { font-weight: 600; margin-right: 5px; }
        .view-all-comments { color: var(--text-secondary); font-size: 14px; padding: 0 14px 12px; cursor: pointer;}

        /* --- MESSAGES (DM) UI --- */
        .chats-list-sidebar { width: 350px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; background: white;}
        .chats-header { padding: 20px; border-bottom: 1px solid var(--border-color); font-weight: 700; font-size: 20px;}
        .chats-list { flex-grow: 1; overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 12px 20px; cursor: pointer; transition: background 0.2s; }
        .chat-item:hover, .chat-item.active-chat { background: var(--bg-color); }
        .chat-item img { width: 56px; height: 56px; border-radius: 50%; margin-right: 12px; object-fit: cover; }
        .chat-details { flex-grow: 1; overflow: hidden; }
        .chat-details .username { display: block; font-size: 14px; font-weight: 400; }
        .chat-details .last-msg { display: block; font-size: 14px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .chat-window { flex-grow: 1; display: flex; flex-direction: column; background: white;}
        .chat-window-header { padding: 15px 20px; display: flex; align-items: center; border-bottom: 1px solid var(--border-color); font-weight: 600; }
        .chat-window-header img { width: 44px; height: 44px; border-radius: 50%; margin-right: 12px; object-fit: cover;}
        .messages-container { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Message Bubbles */
        .msg-row { display: flex; max-width: 65%; }
        .msg-row.sent { align-self: flex-end; justify-content: flex-end; }
        .msg-row.received { align-self: flex-start; align-items: flex-end;}
        .msg-row.received img { width: 28px; height: 28px; border-radius: 50%; margin-right: 8px; object-fit: cover;}
        
        .msg-bubble { padding: 10px 16px; border-radius: 22px; font-size: 14px; line-height: 1.4; word-wrap: break-word;}
        .msg-row.sent .msg-bubble { background-color: var(--blue-color); color: white; border-bottom-right-radius: 4px; }
        .msg-row.received .msg-bubble { background-color: #efefef; color: var(--text-color); border-bottom-left-radius: 4px; }

        .message-input-wrapper { padding: 20px; }
        .message-input-area {
            display: flex; align-items: center; border: 1px solid var(--border-color); border-radius: 24px; padding: 8px 16px;
        }
        .message-input-area input { flex-grow: 1; border: none; outline: none; font-size: 14px; padding: 5px; background: transparent;}
        .message-input-area button { color: var(--blue-color); font-weight: 600; font-size: 14px; margin-left: 10px;}
        .message-input-area button:disabled { color: #b3dbff; cursor: default; }

        /* --- NOTIFICATIONS --- */
        #notifications-section h2 { margin-bottom: 20px; font-weight: 600; }
        .notification-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        .notification-item img.user-pic { width: 44px; height: 44px; border-radius: 50%; margin-right: 15px; object-fit: cover; }
        .notification-item span.notif-text { flex-grow: 1; }
        .notification-item img.post-pic { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; cursor: pointer; }
        .notif-unread { background: #f0f8ff; padding-left: 10px; border-radius: 8px; border-bottom: none; margin-bottom: 5px;}

        /* --- PROFILE --- */
        .profile-header { display: flex; align-items: center; padding: 30px 0 40px; border-bottom: 1px solid var(--border-color); margin-bottom: 20px; }
        .profile-header img { width: 150px; height: 150px; border-radius: 50%; margin-right: 80px; border: 1px solid var(--border-color); object-fit: cover; }
        .profile-info { flex-grow: 1; display: flex; flex-direction: column; gap: 15px; }
        .profile-info-row-1 { display: flex; align-items: center; gap: 20px; font-size: 20px; font-weight: 400; }
        .edit-profile-btn { font-size: 14px; padding: 6px 16px; border: none; background: #efefef; font-weight: 600; border-radius: 8px; transition: background 0.2s;}
        .edit-profile-btn:hover { background: #dbdbdb; }
        .profile-bio strong { font-weight: 600; font-size: 14px; display: block; }
        .profile-bio p { font-size: 14px; white-space: pre-wrap; margin-top: 5px;}
        .profile-posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .grid-item { aspect-ratio: 1/1; background: #efefef; cursor: pointer; position: relative; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .grid-item-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4);
            display: none; justify-content: center; align-items: center; color: white; font-size: 16px; font-weight: 600; gap: 15px;
        }
        .grid-item:hover .grid-item-overlay { display: flex; }

        /* --- OVERLAYS (Create, Post Detail, Edit Profile) --- */
        .overlay-bg {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.65); z-index: 2000; justify-content: center; align-items: center;
        }
        .close-overlay { position: absolute; top: 20px; right: 20px; color: white; font-size: 24px; cursor: pointer; }
        
        .modal-content { background: white; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        
        /* Create Post */
        #create-modal-inner { width: 100%; max-width: 450px; }
        .modal-header { padding: 12px 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 16px; }
        .share-btn { color: var(--blue-color); font-weight: 600; font-size: 14px; }
        .share-btn:disabled { color: #b3dbff; cursor: default;}
        .modal-body { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .file-label { background: var(--blue-color); color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
        #create-image-input { display: none; }
        #preview-image-container { display: none; width: 100%; text-align: center; }
        #create-preview-img { max-width: 100%; max-height: 400px; border-radius: 4px; object-fit: contain; }
        #create-post-caption { width: 100%; border: none; outline: none; resize: none; height: 60px; font-size: 14px; margin-top: 15px; display: none; }
        
        /* Post Detail Overlay */
        #post-modal-inner { width: 90%; max-width: 1000px; height: 85vh; flex-direction: row; }
        .modal-image-side { flex: 1.5; background: black; display: flex; align-items: center; justify-content: center; }
        .modal-image-side img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .modal-data-side { flex: 1; display: flex; flex-direction: column; border-left: 1px solid var(--border-color); background: white;}
        .modal-comments { flex-grow: 1; overflow-y: auto; padding: 16px; }
        .comment-item { display: flex; margin-bottom: 16px; font-size: 14px;}
        .comment-item img { width: 32px; height: 32px; border-radius: 50%; margin-right: 12px; object-fit: cover;}
        .comment-username { font-weight: 600; margin-right: 5px; }
        .modal-bottom { padding: 12px 16px; border-top: 1px solid var(--border-color); }
        .modal-bottom i { font-size: 24px; cursor: pointer; margin-right: 16px;}
        .overlay-add-comment { padding: 12px 16px; border-top: 1px solid var(--border-color); display: flex; align-items: center; }
        .overlay-add-comment input { border: none; outline: none; flex-grow: 1; font-size: 14px; }
        .overlay-add-comment button { color: var(--blue-color); font-weight: 600; font-size: 14px; }

        /* Edit Profile Overlay */
        #edit-modal-inner { width: 400px; padding: 20px; }
        #edit-modal-inner input, #edit-modal-inner textarea { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 15px; font-size: 14px;}
        #edit-modal-inner textarea { resize: none; height: 80px; }
        .edit-actions { display: flex; justify-content: flex-end; gap: 10px; }
        .btn-cancel { color: var(--text-color); font-weight: 600; padding: 8px 12px;}
        .btn-save { background: var(--blue-color); color: white; padding: 8px 16px; border-radius: 8px; font-weight: 600; }

        #loading-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); justify-content: center; align-items: center; font-weight: 600; font-size: 16px; z-index: 10; }

    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>DrukLink</h1>
            <p style="margin-bottom: 30px; color: var(--text-secondary); font-size: 14px;">Sign in to see photos and videos from your friends.</p>
            <button class="google-btn" id="login-btn"><i class="fab fa-google"></i> Log in with Google</button>
        </div>
    </div>

    <div id="app-screen">
        <aside class="sidebar">
            <div class="sidebar-logo nav-link" data-section="feed">DrukLink</div>
            <nav>
                <div class="nav-item nav-link active-nav" data-section="feed"><i class="fas fa-home"></i> Home</div>
                <div class="nav-item nav-link" data-section="search"><i class="fas fa-search"></i> Search</div>
                <div class="nav-item nav-link" data-section="messages"><i class="fab fa-facebook-messenger"></i> Messages</div>
                <div class="nav-item nav-link" data-section="notifications">
                    <i class="far fa-heart"></i> Notifications
                    <span id="notif-badge" class="notif-badge">0</span>
                </div>
                <div class="nav-item" id="nav-create-btn"><i class="far fa-plus-square"></i> Create</div>
                <div class="nav-item nav-link" data-section="profile">
                    <img src="" id="nav-profile-pic" class="profile-pic-small"> Profile
                </div>
            </nav>
            <div class="nav-item" id="logout-btn" style="margin-top: auto; color: #ed4956;"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </aside>

        <main class="content-area">
            
            <section id="feed-section" style="display: block;">
                <div id="feed-content"></div>
            </section>

            <section id="search-section">
                <h2>Search</h2>
                <input type="text" id="search-input" placeholder="Search users..." style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 20px; outline: none;">
                <div id="search-results"></div>
            </section>

            <section id="messages-section">
                <div class="chats-list-sidebar">
                    <div class="chats-header">Messages</div>
                    <div class="chats-list" id="chats-list-container"></div>
                </div>
                <div class="chat-window" id="active-chat-window">
                    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--text-secondary);">
                        <i class="far fa-paper-plane" style="font-size: 60px; margin-bottom: 15px;"></i>
                        <h2>Your Messages</h2>
                        <p style="font-size: 14px;">Send private photos and messages to a friend.</p>
                    </div>
                </div>
            </section>

            <section id="notifications-section">
                <h2>Notifications</h2>
                <div id="notifications-list"></div>
            </section>

            <section id="profile-section">
                <div class="profile-header">
                    <img src="" id="profile-pic-large">
                    <div class="profile-info">
                        <div class="profile-info-row-1">
                            <span id="profile-username"></span>
                            <button class="edit-profile-btn" id="open-edit-profile">Edit Profile</button>
                        </div>
                        <div class="profile-bio">
                            <strong id="profile-fullname"></strong>
                            <p id="profile-bio-text"></p>
                        </div>
                    </div>
                </div>
                <div class="profile-posts-grid" id="profile-posts-content"></div>
            </section>

        </main>
    </div>

    <div id="create-overlay" class="overlay-bg">
        <i class="fas fa-times close-overlay" id="close-create"></i>
        <div class="modal-content" id="create-modal-inner">
            <div id="loading-overlay">Sharing...</div>
            <div class="modal-header">
                <span>Create new post</span>
                <button class="share-btn" id="share-btn" disabled>Share</button>
            </div>
            <div class="modal-body">
                <label for="create-image-input" class="file-label" id="file-label">Select from computer</label>
                <input type="file" id="create-image-input" accept="image/*">
                <div id="preview-image-container">
                    <img id="create-preview-img" src="">
                </div>
                <textarea id="create-post-caption" placeholder="Write a caption..."></textarea>
            </div>
        </div>
    </div>

    <div id="post-overlay" class="overlay-bg">
        <i class="fas fa-times close-overlay" id="close-post"></i>
        <div class="modal-content" id="post-modal-inner"></div>
    </div>

    <div id="edit-profile-overlay" class="overlay-bg">
        <div class="modal-content" id="edit-modal-inner">
            <h3 style="margin-bottom: 20px;">Edit Profile</h3>
            <label style="font-size: 14px; font-weight: 600;">Name / Username</label>
            <input type="text" id="edit-display-name">
            <label style="font-size: 14px; font-weight: 600;">Bio</label>
            <textarea id="edit-bio"></textarea>
            <div class="edit-actions">
                <button class="btn-cancel" id="cancel-edit">Cancel</button>
                <button class="btn-save" id="save-edit-btn">Save</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, doc, arrayUnion, arrayRemove, setDoc, getDoc, getDocs, where, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxPbybzZwn1GbzwMqJ-6zRyI7TRSKvgs0",
            authDomain: "druklink-24fa1.firebaseapp.com",
            projectId: "druklink-24fa1",
            storageBucket: "druklink-24fa1.firebasestorage.app",
            messagingSenderId: "183615496366",
            appId: "1:183615496366:web:fcfb4f88f3223044924d3f",
            measurementId: "G-R8JKT9DE48"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const imgHippoKey = "b5f2098fa836fe7090138a418d294866";

        let currentUser = null;
        let activeFeedListener = null;
        let activeChatListener = null;

        // --- AUTH & INIT ---
        document.getElementById('login-btn').addEventListener('click', () => signInWithPopup(auth, new GoogleAuthProvider()));
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('nav-profile-pic').src = user.photoURL;
                
                await initUser(user);
                listenForUnreadNotifications();
                switchSection('feed');
            } else {
                currentUser = null;
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
                if(activeFeedListener) activeFeedListener();
            }
        });

        async function initUser(user) {
            const userRef = doc(db, "users", user.uid);
            const userDoc = await getDoc(userRef);
            if (!userDoc.exists()) {
                await setDoc(userRef, { displayName: user.displayName, photoURL: user.photoURL, bio: "New to DrukLink", createdAt: serverTimestamp() });
            }
        }

        // --- NAVIGATION ---
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => switchSection(e.currentTarget.dataset.section));
        });

        function switchSection(sectionId) {
            document.querySelectorAll('.content-area > section').forEach(s => s.style.display = 'none');
            const sec = document.getElementById(`${sectionId}-section`);
            sec.style.display = sectionId === 'messages' ? 'flex' : 'block';

            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active-nav'));
            const activeNav = document.querySelector(`.nav-link[data-section="${sectionId}"]`);
            if(activeNav) activeNav.classList.add('active-nav');

            if(sectionId === 'feed') loadFeed();
            if(sectionId === 'profile') loadProfile();
            if(sectionId === 'notifications') loadNotifications();
            if(sectionId === 'messages') loadChatsList();
        }

        // --- CREATE POST ---
        const createOverlay = document.getElementById('create-overlay');
        const imgInput = document.getElementById('create-image-input');
        const shareBtn = document.getElementById('share-btn');
        
        document.getElementById('nav-create-btn').addEventListener('click', () => createOverlay.style.display = 'flex');
        document.getElementById('close-create').addEventListener('click', closeCreate);

        function closeCreate() {
            createOverlay.style.display = 'none';
            imgInput.value = '';
            document.getElementById('create-preview-img').src = '';
            document.getElementById('preview-image-container').style.display = 'none';
            document.getElementById('file-label').style.display = 'block';
            document.getElementById('create-post-caption').style.display = 'none';
            document.getElementById('create-post-caption').value = '';
            shareBtn.disabled = true;
        }

        imgInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const r = new FileReader();
                r.onload = (ev) => {
                    document.getElementById('create-preview-img').src = ev.target.result;
                    document.getElementById('preview-image-container').style.display = 'block';
                    document.getElementById('file-label').style.display = 'none';
                    document.getElementById('create-post-caption').style.display = 'block';
                    shareBtn.disabled = false;
                };
                r.readAsDataURL(file);
            }
        });

        shareBtn.addEventListener('click', async () => {
            const file = imgInput.files[0];
            if (!file) return;
            document.getElementById('loading-overlay').style.display = 'flex';
            shareBtn.disabled = true;

            try {
                const fd = new FormData();
                fd.append('api_key', imgHippoKey);
                fd.append('file', file);
                const res = await fetch('https://api.imghippo.com/v1/upload', { method: 'POST', body: fd });
                const data = await res.json();
                if (!data.success) throw new Error("Upload fail");

                await addDoc(collection(db, "posts"), {
                    userId: currentUser.uid, userName: currentUser.displayName, userPic: currentUser.photoURL,
                    imageUrl: data.data.url, caption: document.getElementById('create-post-caption').value,
                    likedBy: [], comments: [], createdAt: serverTimestamp()
                });
                closeCreate();
                switchSection('feed');
            } catch (err) { alert(err.message); } 
            finally { document.getElementById('loading-overlay').style.display = 'none'; }
        });

        // --- FEED & LIKES ---
        function loadFeed() {
            if(activeFeedListener) activeFeedListener();
            activeFeedListener = onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snap) => {
                const container = document.getElementById('feed-content');
                container.innerHTML = '';
                snap.forEach(docSnap => {
                    const post = docSnap.data();
                    const isLiked = post.likedBy?.includes(currentUser.uid);
                    
                    const el = document.createElement('article');
                    el.className = 'post';
                    el.innerHTML = `
                        <div class="post-header">
                            <img src="${post.userPic}"> <span class="username">${post.userName}</span>
                        </div>
                        <div class="post-image" onclick="openPost('${docSnap.id}')">
                            <img src="${post.imageUrl}">
                        </div>
                        <div class="post-actions">
                            <div class="action-icons">
                                <i class="${isLiked ? 'fas fa-heart liked' : 'far fa-heart'}" onclick="toggleLike('${docSnap.id}', '${post.userId}')"></i>
                                <i class="far fa-comment" onclick="openPost('${docSnap.id}')"></i>
                            </div>
                        </div>
                        <div class="post-likes">${post.likedBy?.length || 0} likes</div>
                        <div class="post-caption"><span class="username">${post.userName}</span> ${post.caption}</div>
                        ${post.comments?.length > 0 ? `<div class="view-all-comments" onclick="openPost('${docSnap.id}')">View all ${post.comments.length} comments</div>` : ''}
                    `;
                    container.appendChild(el);
                });
            });
        }

        window.toggleLike = async (postId, ownerId) => {
            const ref = doc(db, "posts", postId);
            const snap = await getDoc(ref);
            if(!snap.exists()) return;
            const liked = snap.data().likedBy?.includes(currentUser.uid);
            
            if (liked) {
                await updateDoc(ref, { likedBy: arrayRemove(currentUser.uid) });
            } else {
                await updateDoc(ref, { likedBy: arrayUnion(currentUser.uid) });
                if(ownerId !== currentUser.uid) sendNotification(ownerId, 'like', postId);
            }
        };

        // --- POST DETAIL MODAL ---
        const postOverlay = document.getElementById('post-overlay');
        let postUnsub = null;
        
        document.getElementById('close-post').addEventListener('click', () => {
            postOverlay.style.display = 'none';
            if(postUnsub) postUnsub();
        });

        window.openPost = (postId) => {
            postOverlay.style.display = 'flex';
            if(postUnsub) postUnsub();
            postUnsub = onSnapshot(doc(db, "posts", postId), (snap) => {
                if(!snap.exists()) return;
                const post = snap.data();
                const isLiked = post.likedBy?.includes(currentUser.uid);
                
                const cHtml = (post.comments||[]).map(c => `
                    <div class="comment-item">
                        <img src="${c.userPic}">
                        <div><span class="comment-username">${c.userName}</span> ${c.text}</div>
                    </div>
                `).join('');

                document.getElementById('post-modal-inner').innerHTML = `
                    <div class="modal-image-side"><img src="${post.imageUrl}"></div>
                    <div class="modal-data-side">
                        <div class="modal-header"><img src="${post.userPic}" style="width:32px;height:32px;border-radius:50%;margin-right:10px;"> <span class="username">${post.userName}</span></div>
                        <div class="modal-comments">
                            <div class="comment-item"><img src="${post.userPic}"><div><span class="comment-username">${post.userName}</span> ${post.caption}</div></div>
                            ${cHtml}
                        </div>
                        <div class="modal-bottom">
                            <i class="${isLiked ? 'fas fa-heart liked' : 'far fa-heart'}" onclick="toggleLike('${postId}', '${post.userId}')"></i>
                            <div style="font-weight:600; font-size:14px; margin-bottom:10px;">${post.likedBy?.length || 0} likes</div>
                        </div>
                        <div class="overlay-add-comment">
                            <input type="text" id="modal-comment-input" placeholder="Add a comment...">
                            <button onclick="addComment('${postId}', '${post.userId}')">Post</button>
                        </div>
                    </div>
                `;
            });
        };

        window.addComment = async (postId, ownerId) => {
            const input = document.getElementById('modal-comment-input');
            const text = input.value.trim();
            if(!text) return;
            await updateDoc(doc(db, "posts", postId), {
                comments: arrayUnion({ userName: currentUser.displayName, userPic: currentUser.photoURL, text: text })
            });
            input.value = '';
            if(ownerId !== currentUser.uid) sendNotification(ownerId, 'comment', postId, text);
        };

        // --- NOTIFICATIONS ---
        async function sendNotification(recId, type, postId, txt='') {
            await addDoc(collection(db, "notifications"), {
                recipientId: recId, senderName: currentUser.displayName, senderPic: currentUser.photoURL,
                type: type, relatedPostId: postId, text: txt, createdAt: serverTimestamp(), read: false
            });
        }

        function listenForUnreadNotifications() {
            onSnapshot(query(collection(db, "notifications"), where("recipientId", "==", currentUser.uid), where("read", "==", false)), (snap) => {
                const badge = document.getElementById('notif-badge');
                if (snap.size > 0) {
                    badge.innerText = snap.size;
                    badge.style.display = 'flex';
                } else {
                    badge.style.display = 'none';
                }
            });
        }

        function loadNotifications() {
            onSnapshot(query(collection(db, "notifications"), where("recipientId", "==", currentUser.uid), orderBy("createdAt", "desc")), (snap) => {
                const list = document.getElementById('notifications-list');
                list.innerHTML = '';
                if(snap.empty) { list.innerHTML = '<p style="color:var(--text-secondary);">No activity.</p>'; return; }
                
                snap.forEach(docSnap => {
                    const n = docSnap.data();
                    let txt = n.type === 'like' ? 'liked your post.' : `commented: "${n.text}"`;
                    const el = document.createElement('div');
                    el.className = `notification-item ${!n.read ? 'notif-unread' : ''}`;
                    el.innerHTML = `<img src="${n.senderPic}" class="user-pic"><span class="notif-text"><strong>${n.senderName}</strong> ${txt}</span>`;
                    
                    if(n.relatedPostId) {
                        getDoc(doc(db, "posts", n.relatedPostId)).then(p => {
                            if(p.exists()) {
                                const img = document.createElement('img'); img.src = p.data().imageUrl; img.className='post-pic';
                                el.appendChild(img);
                            }
                        });
                        el.addEventListener('click', () => {
                            openPost(n.relatedPostId);
                            if(!n.read) updateDoc(doc(db, "notifications", docSnap.id), { read: true });
                        });
                    }
                    list.appendChild(el);
                });
            });
        }

        // --- MESSAGES (DMs) ---
        let currentChatId = null;

        function loadChatsList() {
            onSnapshot(query(collection(db, "chats"), where("participantUids", "array_contains", currentUser.uid), orderBy("lastMessageTime", "desc")), async (snap) => {
                const list = document.getElementById('chats-list-container');
                list.innerHTML = '';
                for (const docSnap of snap.docs) {
                    const chat = docSnap.data();
                    const otherUid = chat.participantUids.find(id => id !== currentUser.uid);
                    const otherUserSnap = await getDoc(doc(db, "users", otherUid));
                    const otherUser = otherUserSnap.data();

                    const el = document.createElement('div');
                    el.className = `chat-item ${currentChatId === docSnap.id ? 'active-chat' : ''}`;
                    el.innerHTML = `
                        <img src="${otherUser.photoURL}">
                        <div class="chat-details"><span class="username">${otherUser.displayName}</span><span class="last-msg">${chat.lastMessageText}</span></div>
                    `;
                    el.onclick = () => openChat(docSnap.id, otherUser);
                    list.appendChild(el);
                }
            });
        }

        function openChat(chatId, otherUser) {
            currentChatId = chatId;
            document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active-chat'));
            
            const win = document.getElementById('active-chat-window');
            win.innerHTML = `
                <div class="chat-window-header"><img src="${otherUser.photoURL}"> ${otherUser.displayName}</div>
                <div class="messages-container" id="messages-container"></div>
                <div class="message-input-wrapper">
                    <div class="message-input-area">
                        <i class="far fa-smile" style="font-size:24px; margin-right:10px;"></i>
                        <input type="text" id="dm-input" placeholder="Message...">
                        <button id="send-dm">Send</button>
                    </div>
                </div>
            `;

            if(activeChatListener) activeChatListener();
            activeChatListener = onSnapshot(query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc")), (snap) => {
                const mc = document.getElementById('messages-container');
                mc.innerHTML = '';
                snap.forEach(d => {
                    const msg = d.data();
                    const isSent = msg.senderId === currentUser.uid;
                    mc.innerHTML += `<div class="msg-row ${isSent ? 'sent' : 'received'}">
                        ${!isSent ? `<img src="${otherUser.photoURL}">` : ''}
                        <div class="msg-bubble">${msg.text}</div>
                    </div>`;
                });
                mc.scrollTop = mc.scrollHeight;
            });

            document.getElementById('send-dm').onclick = async () => {
                const txt = document.getElementById('dm-input').value.trim();
                if(!txt) return;
                await addDoc(collection(db, "chats", chatId, "messages"), { senderId: currentUser.uid, text: txt, timestamp: serverTimestamp() });
                await updateDoc(doc(db, "chats", chatId), { lastMessageText: txt, lastMessageTime: serverTimestamp() });
                document.getElementById('dm-input').value = '';
            };
        }

        // Search creates/opens chats
        document.getElementById('search-input').addEventListener('input', async (e) => {
            const q = e.target.value.trim();
            const resDiv = document.getElementById('search-results');
            if(!q) { resDiv.innerHTML = ''; return; }

            const usersQ = await getDocs(query(collection(db, "users"), where("displayName", ">=", q), where("displayName", "<=", q + '\uf8ff')));
            resDiv.innerHTML = '';
            usersQ.forEach(d => {
                if(d.id === currentUser.uid) return;
                const u = d.data();
                const el = document.createElement('div');
                el.style.cssText = "display:flex; align-items:center; padding:10px 0; cursor:pointer; border-bottom:1px solid #efefef;";
                el.innerHTML = `<img src="${u.photoURL}" style="width:40px;height:40px;border-radius:50%;margin-right:15px;object-fit:cover;"> <strong>${u.displayName}</strong>`;
                el.onclick = async () => {
                    const eChats = await getDocs(query(collection(db, "chats"), where("participantUids", "array_contains", currentUser.uid)));
                    let found = null;
                    eChats.forEach(c => { if(c.data().participantUids.includes(d.id)) found = c; });
                    
                    if(found) { switchSection('messages'); openChat(found.id, u); }
                    else {
                        const nc = await addDoc(collection(db, "chats"), { participantUids: [currentUser.uid, d.id], lastMessageText: "Chat started", lastMessageTime: serverTimestamp() });
                        switchSection('messages'); openChat(nc.id, u);
                    }
                };
                resDiv.appendChild(el);
            });
        });

        // --- PROFILE & EDIT ---
        function loadProfile() {
            document.getElementById('profile-pic-large').src = currentUser.photoURL;
            document.getElementById('profile-username').innerText = currentUser.displayName;
            document.getElementById('profile-fullname').innerText = currentUser.displayName;
            getDoc(doc(db, "users", currentUser.uid)).then(d => {
                if(d.exists()) document.getElementById('profile-bio-text').innerText = d.data().bio || "";
            });

            onSnapshot(query(collection(db, "posts"), where("userId", "==", currentUser.uid), orderBy("createdAt", "desc")), (snap) => {
                const grid = document.getElementById('profile-posts-content');
                grid.innerHTML = '';
                snap.forEach(d => {
                    const p = d.data();
                    grid.innerHTML += `
                        <div class="grid-item">
                            <img src="${p.imageUrl}">
                            <div class="grid-item-overlay">
                                <i class="fas fa-trash" style="position:absolute; top:10px; right:10px; color:#ff3040; cursor:pointer;" onclick="deletePost(event, '${d.id}')"></i>
                                <div onclick="openPost('${d.id}')" style="cursor:pointer;"><i class="fas fa-heart"></i> ${p.likedBy?.length||0} &nbsp; <i class="fas fa-comment"></i> ${p.comments?.length||0}</div>
                            </div>
                        </div>
                    `;
                });
            });
        }

        window.deletePost = async (e, id) => { e.stopPropagation(); if(confirm("Delete post?")) await deleteDoc(doc(db, "posts", id)); };

        const editOverlay = document.getElementById('edit-profile-overlay');
        document.getElementById('open-edit-profile').onclick = () => {
            document.getElementById('edit-display-name').value = currentUser.displayName;
            document.getElementById('edit-bio').value = document.getElementById('profile-bio-text').innerText;
            editOverlay.style.display = 'flex';
        };
        document.getElementById('cancel-edit').onclick = () => editOverlay.style.display = 'none';
        
        document.getElementById('save-edit-btn').onclick = async () => {
            const nName = document.getElementById('edit-display-name').value.trim();
            const nBio = document.getElementById('edit-bio').value.trim();
            if(!nName) return;
            await updateProfile(auth.currentUser, { displayName: nName });
            await updateDoc(doc(db, "users", currentUser.uid), { displayName: nName, bio: nBio });
            editOverlay.style.display = 'none';
            loadProfile(); // Refresh
        };

    </script>
</body>
</html>
