<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrukLink</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0b0b;
            --card: #161616;
            --border: #262626;
            --accent: #0095f6;
            --text: #ffffff;
        }

        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
        .hidden { display: none !important; }
        
        /* Nav */
        nav { 
            background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--border);
            padding: 10px 20px; display: flex; justify-content: space-between;
            align-items: center; position: sticky; top: 0; z-index: 100;
        }
        .logo { font-family: 'Brush Script MT', cursive; font-size: 2rem; cursor: pointer; }

        /* Login Section */
        #auth-screen { 
            height: 90vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
        }
        .btn-google { 
            background: var(--accent); color: white; padding: 12px 24px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; border: none;
        }

        /* Post Creator */
        .create-box {
            background: var(--card); border: 1px solid var(--border);
            max-width: 500px; margin: 20px auto; padding: 15px; border-radius: 12px;
        }
        textarea { 
            width: 100%; background: none; color: white; border: none; 
            resize: none; font-size: 1rem; padding: 10px 0;
        }
        .controls { display: flex; justify-content: space-between; align-items: center; }
        
        /* Feed */
        #feed { max-width: 500px; margin: 0 auto; padding-bottom: 50px; }
        .post { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; }
        .post-header img { width: 32px; height: 32px; border-radius: 50%; }
        .post-img { width: 100%; display: block; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .post-info { padding: 12px; }
        .like-btn { font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
        .like-btn.active { color: #ff3040; }
    </style>
</head>
<body>

    <nav id="nav-bar" class="hidden">
        <div class="logo">DrukLink</div>
        <button id="logout-btn" style="color: #a8a8a8; cursor: pointer; background:none; border:none;">Logout</button>
    </nav>

    <div id="auth-screen">
        <h1 style="font-family: 'Brush Script MT', cursive; font-size: 4rem;">DrukLink</h1>
        <button class="btn-google" id="login-btn"><i class="fab fa-google"></i> Login with Google</button>
    </div>

    <main id="app" class="hidden">
        <div class="create-box">
            <textarea id="caption" placeholder="What's on your mind?"></textarea>
            <div id="preview-container" style="margin-bottom:10px;"></div>
            <div class="controls">
                <label style="cursor:pointer; color: var(--accent);">
                    <i class="fas fa-image"></i> Add Photo
                    <input type="file" id="file-input" accept="image/*" class="hidden">
                </label>
                <button id="share-btn" class="btn-google" style="padding: 8px 16px;">Post</button>
            </div>
        </div>

        <div id="feed"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, doc, arrayUnion, arrayRemove, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        // CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyCxPbybzZwn1GbzwMqJ-6zRyI7TRSKvgs0",
            authDomain: "druklink-24fa1.firebaseapp.com",
            projectId: "druklink-24fa1",
            storageBucket: "druklink-24fa1.firebasestorage.app",
            messagingSenderId: "183615496366",
            appId: "1:183615496366:web:fcfb4f88f3223044924d3f"
        };
        const imgBBKey = "b5f2098fa836fe7090138a418d294866";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null;

        // AUTH
        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (u) => {
            user = u;
            document.getElementById('auth-screen').classList.toggle('hidden', !!u);
            document.getElementById('app').classList.toggle('hidden', !u);
            document.getElementById('nav-bar').classList.toggle('hidden', !u);
            if(u) loadFeed();
        });

        // IMAGE HANDLING
        let selectedFile = null;
        document.getElementById('file-input').onchange = e => {
            selectedFile = e.target.files[0];
            if(selectedFile) document.getElementById('preview-container').innerHTML = `<p style="color:var(--accent)">Image selected: ${selectedFile.name}</p>`;
        };

        // POSTING
        document.getElementById('share-btn').onclick = async () => {
            const cap = document.getElementById('caption').value;
            if(!selectedFile || !cap) return alert("Add a photo and a caption!");
            
            document.getElementById('share-btn').innerText = "Posting...";
            
            // Upload to ImgBB
            const formData = new FormData();
            formData.append("image", selectedFile);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgBBKey}`, { method: 'POST', body: formData });
            const data = await res.json();

            // Save to Firestore
            await addDoc(collection(db, "posts"), {
                uid: user.uid,
                userName: user.displayName,
                userPic: user.photoURL,
                imageUrl: data.data.url,
                caption: cap,
                likes: [],
                createdAt: serverTimestamp()
            });

            // Reset
            document.getElementById('caption').value = "";
            document.getElementById('preview-container').innerHTML = "";
            document.getElementById('share-btn').innerText = "Post";
            selectedFile = null;
        };

        // LIKE LOGIC
        window.toggleLike = async (postId) => {
            const postRef = doc(db, "posts", postId);
            const snap = await getDoc(postRef);
            if(snap.data().likes.includes(user.uid)) {
                await updateDoc(postRef, { likes: arrayRemove(user.uid) });
            } else {
                await updateDoc(postRef, { likes: arrayUnion(user.uid) });
            }
        };

        // FEED
        function loadFeed() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                snapshot.forEach(d => {
                    const post = d.data();
                    const isLiked = post.likes.includes(user.uid);
                    feed.innerHTML += `
                        <div class="post">
                            <div class="post-header">
                                <img src="${post.userPic}">
                                <strong>${post.userName}</strong>
                            </div>
                            <img src="${post.imageUrl}" class="post-img">
                            <div class="post-info">
                                <i class="fa-heart ${isLiked ? 'fas active' : 'far'} like-btn" onclick="toggleLike('${d.id}')"></i>
                                <p><strong>${post.likes.length} likes</strong></p>
                                <p><strong>${post.userName}</strong> ${post.caption}</p>
                            </div>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
