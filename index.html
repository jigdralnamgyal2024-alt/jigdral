<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrukLink AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #818cf8;
            --bg: #030712;
            --card: #111827;
            --border: rgba(255, 255, 255, 0.1);
            --text: #f3f4f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }

        /* Glassmorphism Login */
        #auth-screen {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 1px solid var(--border); padding: 50px; border-radius: 30px;
            text-align: center; width: 90%; max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Chat Layout */
        #app { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        
        header { 
            padding: 20px; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(3, 7, 18, 0.8); backdrop-filter: blur(5px);
        }

        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        /* Message Bubbles */
        .msg { max-width: 80%; padding: 14px 18px; border-radius: 18px; line-height: 1.5; font-size: 1rem; }
        .msg.user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg.ai { align-self: flex-start; background: #1f2937; border-bottom-left-radius: 4px; border: 1px solid var(--border); }

        /* Input Area */
        .input-area { padding: 25px; background: var(--bg); }
        .input-wrapper { 
            display: flex; gap: 12px; background: #1f2937; padding: 10px 15px; 
            border-radius: 15px; border: 1px solid var(--border); transition: 0.3s;
        }
        .input-wrapper:focus-within { border-color: var(--primary); box-shadow: 0 0 10px rgba(129, 140, 248, 0.2); }
        
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1rem; }
        
        button { background: var(--primary); color: white; border: none; width: 40px; height: 40px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        button:hover { transform: scale(1.05); }
        .btn-login { background: white; color: black; padding: 12px 25px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="login-card">
            <h1 style="font-size: 2.5rem; margin-bottom: 10px; letter-spacing: -1px;">DrukLink <span style="color:var(--primary)">AI</span></h1>
            <p style="color: #94a3b8; font-size: 0.9rem;">Chat with intelligence, la.</p>
            <button class="btn-login" onclick="login()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18">
                Continue with Google
            </button>
        </div>
    </div>

    <div id="app" class="hidden">
        <header>
            <div style="font-weight: bold; font-size: 1.2rem;">DrukLink AI</div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <img id="u-pic" style="width: 32px; height: 32px; border-radius: 50%;">
                <i class="fas fa-sign-out-alt" onclick="logout()" style="cursor: pointer; color: #ef4444;"></i>
            </div>
        </header>

        <div class="chat-box" id="chat-box">
            <div class="msg ai">
                Kuzuzangpo la! I am your AI assistant. How can I help you today?
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Message DrukLink..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()"><i class="fas fa-arrow-up"></i></button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        // Your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCxPbybzZwn1GbzwMqJ-6zRyI7TRSKvgs0",
            authDomain: "druklink-24fa1.firebaseapp.com",
            projectId: "druklink-24fa1",
            storageBucket: "druklink-24fa1.firebasestorage.app",
            messagingSenderId: "183615496366",
            appId: "1:183615496366:web:fcfb4f88f3223044924d3f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                document.getElementById('u-pic').src = user.photoURL;
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app').classList.add('hidden');
            }
        });

        window.sendMessage = () => {
            const input = document.getElementById('userInput');
            const box = document.getElementById('chat-box');
            const text = input.value.trim();

            if (!text) return;

            // User Message
            box.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            // AI Response (Placeholder Logic)
            setTimeout(() => {
                box.innerHTML += `<div class="msg ai">I am processing your message: "${text}". How else can I assist you, la?</div>`;
                box.scrollTop = box.scrollHeight;
            }, 800);
        };
    </script>
</body>
</html>
