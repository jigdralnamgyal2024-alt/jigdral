<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrukLink</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #fafafa;
            --border-color: #dbdbdb;
            --text-color: #000000;
            --text-secondary: #737373;
            --blue-color: #0095f6;
            --blue-hover: #1877f2;
            --sidebar-hover: rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* --- Login Screen --- */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #fafafa;
        }

        .login-box {
            border: 1px solid var(--border-color);
            padding: 50px 40px;
            text-align: center;
            background: white;
            border-radius: 1px;
            width: 350px;
        }

        .login-box h1 {
            font-family: 'Brush Script MT', cursive;
            font-size: 3.5rem;
            margin-bottom: 30px;
            font-weight: normal;
        }

        .google-btn {
            background-color: var(--blue-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }
        .google-btn:hover { background-color: var(--blue-hover); }

        /* --- Main App Layout --- */
        #app-screen {
            display: none;
            display: flex; /* Will be applied via JS when logged in */
            height: 100vh;
        }

        /* Sidebar (Instagram Web Style) */
        .sidebar {
            width: 244px;
            border-right: 1px solid var(--border-color);
            padding: 20px 12px;
            position: fixed;
            height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-logo {
            font-family: 'Brush Script MT', cursive;
            font-size: 2rem;
            padding: 10px 12px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 16px;
        }

        .nav-item:hover { background: var(--sidebar-hover); }
        .nav-item i { font-size: 24px; margin-right: 16px; width: 24px; text-align: center; transition: transform 0.2s;}
        .nav-item:hover i { transform: scale(1.05); }
        
        .nav-item img.profile-pic {
            width: 24px; height: 24px; border-radius: 50%; margin-right: 16px; border: 1px solid var(--border-color);
        }

        /* Feed Container */
        .main-content {
            flex-grow: 1;
            margin-left: 244px; /* Offset for sidebar */
            display: flex;
            justify-content: center;
            padding-top: 40px;
            overflow-y: auto;
        }

        .feed {
            width: 100%;
            max-width: 470px;
            padding-bottom: 60px;
        }

        /* Post Styling */
        .post {
            background: white;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
            border-radius: 0;
        }
        /* Only apply border and radius if screen is slightly larger */
        @media (min-width: 768px) {
            .post { border: 1px solid var(--border-color); border-radius: 4px; }
        }

        .post-header {
            display: flex;
            align-items: center;
            padding: 14px;
        }

        .post-header img {
            width: 32px; height: 32px; border-radius: 50%; margin-right: 12px; border: 1px solid var(--border-color);
        }

        .post-header .username { font-weight: 600; font-size: 14px; cursor: pointer; }
        .post-header .options { margin-left: auto; cursor: pointer; }

        .post-image img { width: 100%; display: block; object-fit: cover; }

        .post-actions { padding: 12px 14px 8px; display: flex; font-size: 24px; }
        .post-actions .action-icons { display: flex; gap: 16px; }
        .post-actions .bookmark-icon { margin-left: auto; }
        
        .post-actions i { cursor: pointer; transition: color 0.1s; }
        .post-actions i:hover { color: var(--text-secondary); }
        .post-actions i.liked { color: #ed4956; animation: pop 0.2s; }
        .post-actions i.liked:hover { color: #ed4956; }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .post-likes { padding: 0 14px; font-weight: 600; font-size: 14px; margin-bottom: 8px; }

        .post-caption { padding: 0 14px; font-size: 14px; margin-bottom: 8px; }
        .post-caption .username { font-weight: 600; margin-right: 5px; }

        .post-comments { padding: 0 14px; font-size: 14px; margin-bottom: 10px; }
        .comment { margin-bottom: 4px; }
        .comment .username { font-weight: 600; margin-right: 5px; }

        .post-add-comment {
            padding: 10px 14px; border-top: 1px solid var(--border-color); display: flex; align-items: center;
        }
        .post-add-comment i { font-size: 24px; margin-right: 12px; cursor: pointer; }
        .post-add-comment input {
            border: none; outline: none; flex-grow: 1; font-size: 14px; padding: 8px 0; background: transparent;
        }
        .post-add-comment button {
            border: none; background: none; color: var(--blue-color); font-weight: 600; cursor: pointer; font-size: 14px;
        }
        .post-add-comment button:disabled { color: #b3dbff; cursor: default; }

        /* Create Post Modal */
        #create-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.65); z-index: 2000; justify-content: center; align-items: center;
        }

        .modal-content {
            background: white; width: 100%; max-width: 500px; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column;
        }

        .modal-header {
            padding: 10px 16px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 16px;
        }

        .share-btn { color: var(--blue-color); cursor: pointer; border: none; background: none; font-weight: 600; font-size: 14px; }
        
        .modal-body { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .modal-body .file-label {
            background: var(--blue-color); color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-bottom: 15px; font-size: 14px;
        }
        .modal-body input[type="file"] { display: none; }
        #preview-image { max-width: 100%; max-height: 300px; margin-bottom: 15px; border-radius: 4px; display: none; object-fit: contain; }
        
        .modal-body textarea {
            width: 100%; border: none; outline: none; resize: none; height: 80px; font-size: 16px;
        }

        #loading-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); justify-content: center; align-items: center; font-weight: 600; font-size: 18px; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>DrukLink</h1>
            <p style="margin-bottom: 30px; color: var(--text-secondary); font-size: 14px; font-weight: 600;">Sign in to see photos and videos from your friends.</p>
            <button class="google-btn" id="login-btn">
                <i class="fab fa-google"></i> Log in with Google
            </button>
        </div>
    </div>

    <div id="app-screen">
        
        <aside class="sidebar">
            <div class="sidebar-logo">DrukLink</div>
            <div class="nav-item"><i class="fas fa-home"></i> Home</div>
            <div class="nav-item"><i class="fas fa-search"></i> Search</div>
            <div class="nav-item"><i class="far fa-compass"></i> Explore</div>
            <div class="nav-item"><i class="fas fa-video"></i> Reels</div>
            <div class="nav-item"><i class="fab fa-facebook-messenger"></i> Messages</div>
            <div class="nav-item"><i class="far fa-heart"></i> Notifications</div>
            <div class="nav-item" id="nav-create-btn"><i class="far fa-plus-square"></i> Create</div>
            <div class="nav-item"><img src="" alt="Profile" id="nav-profile-pic" class="profile-pic"> Profile</div>
            
            <div class="nav-item" id="logout-btn" style="margin-top: auto; color: #ed4956;"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </aside>

        <main class="main-content">
            <div class="feed" id="feed">
                </div>
        </main>
    </div>

    <div id="create-modal">
        <div class="modal-content" style="position: relative;">
            <div id="loading-overlay">Sharing...</div>
            <div class="modal-header">
                <i class="fas fa-arrow-left" style="cursor:pointer; font-size: 20px;" id="close-modal"></i>
                <span>Create new post</span>
                <button class="share-btn" id="share-btn">Share</button>
            </div>
            <div class="modal-body">
                <label for="image-upload" class="file-label">Select from computer</label>
                <input type="file" id="image-upload" accept="image/*">
                <img id="preview-image" src="" alt="Preview">
                <textarea id="post-caption" placeholder="Write a caption..."></textarea>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, doc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCxPbybzZwn1GbzwMqJ-6zRyI7TRSKvgs0",
            authDomain: "druklink-24fa1.firebaseapp.com",
            projectId: "druklink-24fa1",
            storageBucket: "druklink-24fa1.firebasestorage.app",
            messagingSenderId: "183615496366",
            appId: "1:183615496366:web:fcfb4f88f3223044924d3f",
            measurementId: "G-R8JKT9DE48"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const imgHippoKey = "b5f2098fa836fe7090138a418d294866";

        let currentUser = null;

        // UI DOM Elements
        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app-screen');
        const feedContainer = document.getElementById('feed');
        const navProfilePic = document.getElementById('nav-profile-pic');
        
        // --- AUTH ---
        document.getElementById('login-btn').addEventListener('click', () => {
            signInWithPopup(auth, new GoogleAuthProvider()).catch(err => alert("Login failed: " + err.message));
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loginScreen.style.display = 'none';
                appScreen.style.display = 'flex'; // Changed to flex for sidebar layout
                navProfilePic.src = user.photoURL;
                loadFeed();
            } else {
                loginScreen.style.display = 'flex';
                appScreen.style.display = 'none';
                feedContainer.innerHTML = '';
            }
        });

        // --- CREATE POST UI LOGIC ---
        const createModal = document.getElementById('create-modal');
        const imageUpload = document.getElementById('image-upload');
        const previewImage = document.getElementById('preview-image');
        
        document.getElementById('nav-create-btn').addEventListener('click', () => createModal.style.display = 'flex');
        document.getElementById('close-modal').addEventListener('click', () => {
            createModal.style.display = 'none';
            imageUpload.value = '';
            previewImage.style.display = 'none';
        });

        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImage.src = e.target.result;
                    previewImage.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // --- POSTING TO DB ---
        document.getElementById('share-btn').addEventListener('click', async () => {
            const file = imageUpload.files[0];
            const caption = document.getElementById('post-caption').value;
            if (!file) return alert("Select an image!");

            document.getElementById('loading-overlay').style.display = 'flex';

            try {
                // Upload Image
                const formData = new FormData();
                formData.append('api_key', imgHippoKey);
                formData.append('file', file);
                const response = await fetch('https://api.imghippo.com/v1/upload', { method: 'POST', body: formData });
                const imgData = await response.json();
                if (!imgData.success) throw new Error("Upload failed");

                // Save Post logic changed to support User IDs for likes
                await addDoc(collection(db, "posts"), {
                    userId: currentUser.uid,
                    userName: currentUser.displayName,
                    userPic: currentUser.photoURL,
                    imageUrl: imgData.data.url,
                    caption: caption,
                    likedBy: [], // Array of UIDs instead of a number
                    comments: [], // Array of comment objects
                    createdAt: serverTimestamp()
                });

                // Reset
                document.getElementById('close-modal').click();
                document.getElementById('post-caption').value = '';
            } catch (error) {
                console.error(error);
                alert("Error sharing post.");
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
            }
        });

        // --- REAL-TIME FEED & LIKE TOGGLE ---
        function loadFeed() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (snapshot) => {
                feedContainer.innerHTML = ''; 
                
                snapshot.forEach((docSnap) => {
                    const post = docSnap.data();
                    const postId = docSnap.id;
                    
                    // Fallbacks for older posts
                    const likedBy = post.likedBy || [];
                    const comments = post.comments || [];
                    const isLiked = likedBy.includes(currentUser.uid);
                    
                    const heartClass = isLiked ? "fas fa-heart liked" : "far fa-heart";
                    
                    let commentsHTML = comments.map(c => `<div class="comment"><span class="username">${c.userName}</span> ${c.text}</div>`).join('');

                    const postEl = document.createElement('article');
                    postEl.className = 'post';
                    postEl.innerHTML = `
                        <div class="post-header">
                            <img src="${post.userPic}" alt="User">
                            <span class="username">${post.userName}</span>
                            <i class="fas fa-ellipsis-h options"></i>
                        </div>
                        <div class="post-image">
                            <img src="${post.imageUrl}" alt="Post image">
                        </div>
                        <div class="post-actions">
                            <div class="action-icons">
                                <i class="${heartClass} like-btn" data-id="${postId}" data-liked="${isLiked}"></i>
                                <i class="far fa-comment"></i>
                                <i class="far fa-paper-plane"></i>
                            </div>
                            <div class="bookmark-icon"><i class="far fa-bookmark"></i></div>
                        </div>
                        <div class="post-likes">${likedBy.length} likes</div>
                        <div class="post-caption">
                            <span class="username">${post.userName}</span>${post.caption}
                        </div>
                        <div class="post-comments">${commentsHTML}</div>
                        <div class="post-add-comment">
                            <i class="far fa-smile"></i>
                            <input type="text" placeholder="Add a comment..." class="comment-input" data-id="${postId}">
                            <button class="post-comment-btn" data-id="${postId}" disabled>Post</button>
                        </div>
                    `;
                    feedContainer.appendChild(postEl);
                });

                attachPostListeners();
            });
        }

        function attachPostListeners() {
            // LIKE TOGGLE LOGIC
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const postId = e.target.getAttribute('data-id');
                    const isLiked = e.target.getAttribute('data-liked') === 'true';
                    const postRef = doc(db, "posts", postId);

                    // If currently liked, remove user ID. If not liked, add user ID.
                    if (isLiked) {
                        await updateDoc(postRef, { likedBy: arrayRemove(currentUser.uid) });
                    } else {
                        await updateDoc(postRef, { likedBy: arrayUnion(currentUser.uid) });
                    }
                });
            });

            // COMMENT INPUT LOGIC (Enable/Disable 'Post' button)
            document.querySelectorAll('.comment-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    const btn = document.querySelector(`.post-comment-btn[data-id="${e.target.dataset.id}"]`);
                    btn.disabled = e.target.value.trim().length === 0;
                });
            });

            // SUBMIT COMMENT LOGIC
            document.querySelectorAll('.post-comment-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const postId = e.target.getAttribute('data-id');
                    const inputField = document.querySelector(`.comment-input[data-id="${postId}"]`);
                    const commentText = inputField.value.trim();
                    
                    if (commentText) {
                        const postRef = doc(db, "posts", postId);
                        await updateDoc(postRef, {
                            comments: arrayUnion({
                                uid: currentUser.uid,
                                userName: currentUser.displayName,
                                text: commentText
                            })
                        });
                        inputField.value = ''; // clear input immediately
                    }
                });
            });
        }
    </script>
</body>
</html>
