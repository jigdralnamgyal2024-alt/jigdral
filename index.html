<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrukLink</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --border: #262626;
            --accent: #0095f6;
            --text: #ffffff;
            --secondary: #a8a8a8;
            --hover: #1a1a1a;
        }

        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; }
        .hidden { display: none !important; }
        
        /* Sidebar Navigation */
        .sidebar { 
            width: 240px; height: 100vh; border-right: 1px solid var(--border);
            padding: 20px 12px; display: flex; flex-direction: column;
            position: fixed; left: 0; top: 0; background: var(--bg); z-index: 1000;
        }

        .logo { font-family: 'Brush Script MT', cursive; font-size: 2.2rem; padding: 20px 12px 30px; cursor: pointer; }

        .nav-links { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        
        .nav-item { 
            display: flex; align-items: center; gap: 16px; padding: 12px;
            font-size: 1.1rem; cursor: pointer; color: var(--text);
            border-radius: 8px; transition: 0.2s;
        }

        .nav-item:hover { background: var(--hover); }
        .nav-item.active { font-weight: bold; }

        /* Content Area */
        main { flex-grow: 1; margin-left: 240px; display: flex; justify-content: center; min-height: 100vh; }
        .content-container { width: 100%; max-width: 500px; padding: 20px; }

        /* Post Creator */
        .post-creator { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 40px; }
        textarea { width: 100%; background: transparent; color: white; border: none; font-size: 1rem; resize: none; outline: none; margin-bottom: 10px; }
        
        .btn-post { background: var(--accent); color: white; border: none; padding: 8px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-post:disabled { background: #004a7c; cursor: not-allowed; }

        /* Feed */
        .post { border-bottom: 1px solid var(--border); padding-bottom: 25px; margin-bottom: 25px; }
        .post-header { padding: 10px 0; display: flex; align-items: center; gap: 10px; }
        .post-header img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .post-img { width: 100%; border-radius: 4px; border: 1px solid var(--border); max-height: 500px; object-fit: cover; }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar { width: 72px; }
            .nav-text, .logo { display: none; }
            main { margin-left: 72px; }
        }
    </style>
</head>
<body>

    <div id="auth-screen" style="width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <h1 style="font-family: 'Brush Script MT', cursive; font-size: 5rem;">DrukLink</h1>
        <button onclick="login()" class="btn-post" style="padding: 12px 40px;">Login with Google</button>
    </div>

    <div id="app" class="hidden" style="display: flex; width: 100%;">
        <aside class="sidebar">
            <div class="logo">DrukLink</div>
            <nav class="nav-links">
                <div class="nav-item active" onclick="showScreen('home', this)"><i class="fas fa-home"></i><span class="nav-text">Home</span></div>
                <div class="nav-item" onclick="showScreen('friends', this)"><i class="fas fa-search"></i><span class="nav-text">Explore</span></div>
                <div class="nav-item" onclick="showScreen('profile', this)"><i class="far fa-user"></i><span class="nav-text">Profile</span></div>
            </nav>
            <div class="nav-item" onclick="logout()" style="margin-top: auto; color: #ff3040;"><i class="fas fa-sign-out-alt"></i><span class="nav-text">Logout</span></div>
        </aside>

        <main>
            <div class="content-container">
                <div id="home-screen" class="screen">
                    <div class="post-creator">
                        <textarea id="post-caption" placeholder="What's on your mind, la?"></textarea>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <label style="cursor: pointer; color: var(--accent); font-weight: bold;">
                                <i class="fas fa-camera"></i> Select Photo
                                <input type="file" id="post-file" class="hidden" accept="image/*">
                            </label>
                            <span id="file-status" style="font-size: 0.8rem; color: var(--secondary);"></span>
                            <button id="upload-btn" class="btn-post" onclick="uploadPost()">Post</button>
                        </div>
                    </div>
                    <div id="main-feed"></div>
                </div>

                <div id="friends-screen" class="screen hidden"><div class="page-title">Explore Users</div><div id="users-list"></div></div>
                <div id="profile-screen" class="screen hidden" style="text-align: center; padding-top: 50px;">
                    <img id="my-avatar" src="" style="width: 120px; height: 120px; border-radius: 50%;">
                    <h2 id="my-name"></h2>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, doc, arrayUnion, arrayRemove, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxPbybzZwn1GbzwMqJ-6zRyI7TRSKvgs0",
            authDomain: "druklink-24fa1.firebaseapp.com",
            projectId: "druklink-24fa1",
            storageBucket: "druklink-24fa1.firebasestorage.app",
            messagingSenderId: "183615496366",
            appId: "1:183615496366:web:fcfb4f88f3223044924d3f"
        };
        const imgBBKey = "b5f2098fa836fe7090138a418d294866";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null;

        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, async (u) => {
            user = u;
            document.getElementById('auth-screen').classList.toggle('hidden', !!u);
            document.getElementById('app').classList.toggle('hidden', !u);
            if(u) {
                document.getElementById('my-avatar').src = u.photoURL;
                document.getElementById('my-name').innerText = u.displayName;
                await setDoc(doc(db, "users", u.uid), { name: u.displayName, pic: u.photoURL }, { merge: true });
                loadFeed();
            }
        });

        // Show file name when selected
        document.getElementById('post-file').addEventListener('change', function() {
            const fileName = this.files[0] ? this.files[0].name : "";
            document.getElementById('file-status').innerText = fileName ? "Ready: " + fileName : "";
        });

        window.uploadPost = async () => {
            const fileInput = document.getElementById('post-file');
            const captionInput = document.getElementById('post-caption');
            const uploadBtn = document.getElementById('upload-btn');
            
            const file = fileInput.files[0];
            const caption = captionInput.value.trim();

            if (!file || !caption) {
                alert("Kuzuzangpo! Please select a photo and write a caption first, la.");
                return;
            }

            // Disable button while uploading
            uploadBtn.innerText = "Posting...";
            uploadBtn.disabled = true;

            try {
                // 1. Upload Image to ImgBB
                const formData = new FormData();
                formData.append("image", file);

                const response = await fetch(`https://api.imgbb.com/1/upload?key=${imgBBKey}`, {
                    method: "POST",
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    // 2. Save Link and Data to Firestore
                    await addDoc(collection(db, "posts"), {
                        uid: user.uid,
                        name: user.displayName,
                        pic: user.photoURL,
                        img: result.data.url,
                        caption: caption,
                        likes: [],
                        time: serverTimestamp()
                    });

                    // 3. Clear Inputs
                    fileInput.value = "";
                    captionInput.value = "";
                    document.getElementById('file-status').innerText = "";
                } else {
                    alert("Image upload failed. Try again!");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Something went wrong, la!");
            }

            uploadBtn.innerText = "Post";
            uploadBtn.disabled = false;
        };

        function loadFeed() {
            const q = query(collection(db, "posts"), orderBy("time", "desc"));
            onSnapshot(q, snap => {
                const feed = document.getElementById('main-feed');
                feed.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const liked = p.likes?.includes(user.uid);
                    feed.innerHTML += `
                        <div class="post">
                            <div class="post-header"><img src="${p.pic}"> <b>${p.name}</b></div>
                            <img src="${p.img}" class="post-img">
                            <div style="padding: 12px 0;">
                                <i class="${liked ? 'fas' : 'far'} fa-heart" onclick="likePost('${d.id}')" style="color:${liked ? '#ed4956' : 'white'}; font-size: 1.5rem; cursor: pointer;"></i>
                                <div style="margin: 8px 0;"><b>${p.likes?.length || 0} likes</b></div>
                                <div><b>${p.name}</b> ${p.caption}</div>
                            </div>
                        </div>`;
                });
            });
        }

        window.likePost = async (id) => {
            const ref = doc(db, "posts", id);
            const s = await getDoc(ref);
            if(s.data().likes.includes(user.uid)) await updateDoc(ref, { likes: arrayRemove(user.uid) });
            else await updateDoc(ref, { likes: arrayUnion(user.uid) });
        };

        window.showScreen = (id, el) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id + '-screen').classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        };
    </script>
</body>
</html>
