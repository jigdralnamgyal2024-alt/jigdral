<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrukLink</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --border: #262626;
            --accent: #0095f6;
            --text: #ffffff;
            --secondary: #a8a8a8;
        }

        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 70px; }
        .hidden { display: none !important; }
        
        /* Navigation */
        nav { 
            background: var(--bg); border-bottom: 1px solid var(--border);
            padding: 15px 20px; display: flex; justify-content: space-between;
            align-items: center; position: sticky; top: 0; z-index: 100;
        }
        .logo { font-family: 'Brush Script MT', cursive; font-size: 2rem; }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: var(--bg);
            border-top: 1px solid var(--border); display: flex; 
            justify-content: space-around; padding: 15px 0; z-index: 100;
        }
        .nav-item { font-size: 1.4rem; cursor: pointer; color: var(--secondary); }
        .nav-item.active { color: var(--text); }

        /* Screens */
        .screen { max-width: 500px; margin: 0 auto; padding: 20px; }
        .page-title { font-size: 1.5rem; margin-bottom: 20px; font-weight: bold; }

        /* Post Cards */
        .post { background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; }
        .post-header { padding: 10px; display: flex; align-items: center; gap: 10px; }
        .post-header img { width: 30px; height: 30px; border-radius: 50%; }
        .post-img { width: 100%; display: block; }
        .post-content { padding: 12px; }

        /* Placeholder Lists (Friends, Notifs, Messages) */
        .list-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .list-item img { width: 45px; height: 45px; border-radius: 50%; }
        .list-info b { display: block; font-size: 0.9rem; }
        .list-info span { color: var(--secondary); font-size: 0.8rem; }

        /* Profile */
        .profile-top { text-align: center; padding: 20px 0; }
        .profile-top img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--border); }

        button { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen" style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <h1 style="font-family: 'Brush Script MT', cursive; font-size: 4rem;">DrukLink</h1>
        <button onclick="login()" style="width: auto; padding: 10px 30px;">Login with Google</button>
    </div>

    <div id="app" class="hidden">
        <nav>
            <div class="logo">DrukLink</div>
            <i class="fas fa-sign-out-alt" onclick="logout()" style="color: var(--secondary); cursor: pointer;"></i>
        </nav>

        <div id="home-screen" class="screen">
            <div class="post-creator" style="margin-bottom: 30px;">
                <input type="file" id="post-file" class="hidden" accept="image/*">
                <button onclick="document.getElementById('post-file').click()" style="background: #262626; margin-bottom: 10px;">Select Photo</button>
                <textarea id="post-caption" placeholder="Write a caption..." style="width:100%; background: #121212; color:white; border: 1px solid #262626; padding: 10px; border-radius: 5px;"></textarea>
                <button id="upload-btn" onclick="uploadPost()" style="margin-top: 10px;">Share Post</button>
            </div>
            <div id="main-feed"></div>
        </div>

        <div id="notif-screen" class="screen hidden">
            <div class="page-title">Notifications</div>
            <div id="notif-list">
                <div class="list-item">
                    <img src="https://via.placeholder.com/45" alt="">
                    <div class="list-info"><b>Welcome!</b><span>Welcome to DrukLink! Start following friends.</span></div>
                </div>
            </div>
        </div>

        <div id="friends-screen" class="screen hidden">
            <div class="page-title">Find Friends</div>
            <div id="users-list"></div>
        </div>

        <div id="msg-screen" class="screen hidden">
            <div class="page-title">Messages</div>
            <p style="color: var(--secondary); text-align: center;">Your direct messages will appear here.</p>
        </div>

        <div id="profile-screen" class="screen hidden">
            <div class="profile-top">
                <img id="my-avatar" src="">
                <h2 id="my-name" style="margin-top: 10px;"></h2>
                <p style="color: var(--secondary);">@druklink_user</p>
            </div>
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
            <div id="my-posts-grid"></div>
        </div>

        <div class="bottom-nav">
            <i class="fas fa-home nav-item active" onclick="showScreen('home', this)"></i>
            <i class="fas fa-search nav-item" onclick="showScreen('friends', this)"></i>
            <i class="far fa-heart nav-item" onclick="showScreen('notif', this)"></i>
            <i class="far fa-comment nav-item" onclick="showScreen('msg', this)"></i>
            <i class="far fa-user nav-item" onclick="showScreen('profile', this)"></i>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, updateDoc, doc, arrayUnion, arrayRemove, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxPbybzZwn1GbzwMqJ-6zRyI7TRSKvgs0",
            authDomain: "druklink-24fa1.firebaseapp.com",
            projectId: "druklink-24fa1",
            storageBucket: "druklink-24fa1.firebasestorage.app",
            messagingSenderId: "183615496366",
            appId: "1:183615496366:web:fcfb4f88f3223044924d3f"
        };
        const imgBBKey = "b5f2098fa836fe7090138a418d294866";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null;

        // AUTH FUNCTIONS
        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, async (u) => {
            user = u;
            document.getElementById('auth-screen').classList.toggle('hidden', !!u);
            document.getElementById('app').classList.toggle('hidden', !u);
            if(u) {
                document.getElementById('my-avatar').src = u.photoURL;
                document.getElementById('my-name').innerText = u.displayName;
                // Save user to DB
                await setDoc(doc(db, "users", u.uid), { name: u.displayName, pic: u.photoURL }, { merge: true });
                loadFeed();
                loadUsers();
            }
        });

        // SCREEN SWITCHER
        window.showScreen = (screenId, el) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId + '-screen').classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(i => {
                i.classList.remove('active', 'fas');
                i.classList.add('far');
            });
            el.classList.add('active', 'fas');
            el.classList.remove('far');
        };

        // POSTING
        window.uploadPost = async () => {
            const file = document.getElementById('post-file').files[0];
            const caption = document.getElementById('post-caption').value;
            if(!file) return alert("Select a photo first!");

            document.getElementById('upload-btn').innerText = "Uploading...";
            const formData = new FormData();
            formData.append("image", file);
            
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${imgBBKey}`, { method: 'POST', body: formData });
            const data = await res.json();

            await addDoc(collection(db, "posts"), {
                uid: user.uid,
                name: user.displayName,
                pic: user.photoURL,
                img: data.data.url,
                caption: caption,
                likes: [],
                time: serverTimestamp()
            });

            document.getElementById('upload-btn').innerText = "Share Post";
            document.getElementById('post-caption').value = "";
        };

        // LOAD FEED
        function loadFeed() {
            onSnapshot(query(collection(db, "posts"), orderBy("time", "desc")), (snap) => {
                const feed = document.getElementById('main-feed');
                feed.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const liked = p.likes.includes(user.uid);
                    feed.innerHTML += `
                        <div class="post">
                            <div class="post-header"><img src="${p.pic}"> <b>${p.name}</b></div>
                            <img src="${p.img}" class="post-img">
                            <div class="post-content">
                                <i class="${liked ? 'fas' : 'far'} fa-heart" onclick="likePost('${d.id}')" style="color:${liked ? 'red' : 'white'}; cursor:pointer; font-size: 1.2rem;"></i>
                                <div style="margin-top:5px;"><b>${p.likes.length} likes</b></div>
                                <div><b>${p.name}</b> ${p.caption}</div>
                            </div>
                        </div>`;
                });
            });
        }

        window.likePost = async (id) => {
            const ref = doc(db, "posts", id);
            const docSnap = await getDoc(ref);
            if(docSnap.data().likes.includes(user.uid)) {
                await updateDoc(ref, { likes: arrayRemove(user.uid) });
            } else {
                await updateDoc(ref, { likes: arrayUnion(user.uid) });
            }
        };

        function loadUsers() {
            onSnapshot(collection(db, "users"), snap => {
                const list = document.getElementById('users-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    if(d.id !== user.uid) {
                        const u = d.data();
                        list.innerHTML += `
                            <div class="list-item">
                                <img src="${u.pic}">
                                <div class="list-info"><b>${u.name}</b><span>Active now</span></div>
                                <button style="width: auto; margin-left: auto; padding: 5px 15px;">Follow</button>
                            </div>`;
                    }
                });
            });
        }
    </script>
</body>
</html>
