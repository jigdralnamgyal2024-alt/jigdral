```html
<!DOCTYPE html>
<html>
<head>

<title>Druk Link</title>

<style>

body{
font-family:Arial;
background:#f0f2f5;
margin:0;
}

header{
background:#0066cc;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
width:500px;
margin:auto;
}

.login{
margin-top:50px;
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

.feed{
display:none;
}

.postbox{
background:white;
padding:15px;
margin-top:20px;
border-radius:10px;
}

textarea{
width:100%;
height:60px;
}

.post{
background:white;
padding:10px;
margin-top:15px;
border-radius:10px;
}

.reactions span{
cursor:pointer;
font-size:20px;
margin-right:10px;
}

.comment{
font-size:14px;
margin-top:5px;
}

img{
max-width:100%;
margin-top:10px;
border-radius:8px;
}

</style>

</head>

<body>

<header>Druk Link</header>

<div class="container">

<div class="login" id="loginPage">

<h3>Login to Druk Link</h3>

<input id="username" placeholder="Enter username"><br><br>

<button onclick="login()">Login</button>

</div>


<div class="feed" id="feedPage">

<h3 id="welcome"></h3>

<div class="postbox">

<textarea id="postText" placeholder="What's on your mind?"></textarea><br>

<input type="file" id="imageUpload"><br><br>

<button onclick="createPost()">Post</button>

</div>

<div id="posts"></div>

</div>

</div>

<script>

let user="";

function login(){

user=document.getElementById("username").value;

if(user=="") return;

document.getElementById("loginPage").style.display="none";
document.getElementById("feedPage").style.display="block";

document.getElementById("welcome").innerText="Welcome "+user;

}

function createPost(){

let text=document.getElementById("postText").value;
let file=document.getElementById("imageUpload").files[0];

let post=document.createElement("div");
post.className="post";

let content="<b>"+user+"</b><p>"+text+"</p>";

if(file){

let reader=new FileReader();

reader.onload=function(e){

post.innerHTML=content+
"<img src='"+e.target.result+"'>"+
reactionSection()+
commentSection();

document.getElementById("posts").prepend(post);

};

reader.readAsDataURL(file);

}else{

post.innerHTML=content+
reactionSection()+
commentSection();

document.getElementById("posts").prepend(post);

}

document.getElementById("postText").value="";
document.getElementById("imageUpload").value="";

}

function reactionSection(){

return `
<div class="reactions">

<span onclick="react(this)">👍</span>

<span onclick="react(this)">❤️</span>

<span onclick="react(this)">😂</span>

<span onclick="react(this)">😮</span>

<span onclick="react(this)">😢</span>

</div>

`;

}

function react(e){

alert("You reacted "+e.innerText);

}

function commentSection(){

return `

<div>

<input placeholder="Write comment">

<button onclick="addComment(this)">Comment</button>

<div class="comments"></div>

</div>

`;

}

function addComment(btn){

let input=btn.previousElementSibling;

if(input.value=="") return;

let comment=document.createElement("div");

comment.className="comment";

comment.innerText=user+": "+input.value;

btn.nextElementSibling.appendChild(comment);

input.value="";

}

</script>

</body>
</html>
```
