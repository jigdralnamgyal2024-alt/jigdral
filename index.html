<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrukTalk AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* True ChatGPT / Gemini Modern UI */
        :root {
            --sidebar-bg: #171717;
            --main-bg: #212121;
            --user-msg-bg: #2f2f2f;
            --text-main: #ececec;
            --text-muted: #9b9b9b;
            --border-color: rgba(255,255,255,0.1);
            --accent: #10a37f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--main-bg); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; }
        .hidden { display: none !important; }

        /* Modals & Screens */
        .overlay-screen { background: rgba(0,0,0,0.8); width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; position: absolute; z-index: 100; backdrop-filter: blur(5px); }
        .card-box { background: var(--sidebar-bg); border: 1px solid var(--border-color); padding: 40px; border-radius: 16px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Buttons & Inputs */
        .primary-btn { width: 100%; padding: 12px; background: white; color: #171717; border-radius: 8px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 25px; cursor: pointer; border: none; font-size: 15px; transition: 0.2s;}
        .primary-btn:hover { background: #f1f1f1; }
        .styled-input { width: 100%; padding: 12px; margin-top: 20px; background: var(--main-bg); border: 1px solid var(--border-color); color: white; border-radius: 8px; font-size: 15px; outline: none;}
        .styled-input:focus { border-color: var(--accent); }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar-bg); display: flex; flex-direction: column; padding: 15px 10px; flex-shrink: 0; transition: transform 0.3s ease; border-right: 1px solid var(--border-color);}
        
        .sidebar-brand { padding: 5px 15px 25px; display: flex; align-items: center; gap: 12px; font-size: 18px; font-weight: 600; color: white; }
        .sidebar-brand img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }

        .new-chat-btn { display: flex; align-items: center; gap: 10px; padding: 12px 15px; width: 100%; border-radius: 8px; cursor: pointer; background: transparent; color: var(--text-main); border: none; font-size: 14px; font-weight: 500; transition: 0.2s; text-align: left; margin-bottom: 20px;}
        .new-chat-btn:hover { background: var(--user-msg-bg); }
        
        .nav-item { padding: 10px 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; margin-bottom: 2px; color: var(--text-main); font-size: 14px;}
        .nav-item:hover { background: rgba(255,255,255,0.05); }
        
        /* Main Chat Area */
        .main-container { flex: 1; display: flex; flex-direction: column; position: relative; height: 100vh; }
        .screen { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        
        #chat-feed { flex: 1; overflow-y: auto; padding: 40px 20px; display: flex; flex-direction: column; scroll-behavior: smooth; }
        .chat-content-limit { width: 100%; max-width: 768px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }

        /* EXACT ChatGPT Message Styling */
        .msg-row { display: flex; width: 100%; }
        .msg-row.user { justify-content: flex-end; }
        .msg-row.ai { justify-content: flex-start; gap: 16px; }

        .msg-bubble.user { background: var(--user-msg-bg); color: var(--text-main); padding: 10px 20px; border-radius: 20px; font-size: 16px; line-height: 1.5; max-width: 70%; word-wrap: break-word; }
        
        .ai-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; overflow: hidden; background: #fff;}
        .ai-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .msg-bubble.ai { background: transparent; color: var(--text-main); font-size: 16px; line-height: 1.6; max-width: 85%; word-wrap: break-word; padding-top: 5px;}

        /* Input Area */
        .input-wrap { padding: 20px; width: 100%; max-width: 800px; margin: 0 auto; }
        .input-box { background: var(--user-msg-bg); border-radius: 26px; padding: 10px 15px 10px 20px; display: flex; align-items: flex-end; gap: 10px; }
        
        textarea { flex: 1; background: transparent; border: none; color: var(--text-main); outline: none; font-size: 16px; padding: 8px 0; resize: none; max-height: 200px; line-height: 1.5; min-height: 40px; font-family: inherit;}
        
        button.send-btn { background: white; color: black; border: none; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; flex-shrink: 0; margin-bottom: 4px;}
        button.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Mobile */
        .mobile-header { display: none; padding: 15px 20px; border-bottom: 1px solid var(--border-color); color: white; font-weight: 600; font-size: 16px; align-items: center; gap: 15px;}
        @media (max-width: 768px) { 
            .sidebar { position: absolute; left: -260px; z-index: 50; height: 100%; } 
            .mobile-header { display: flex; }
            .msg-bubble.user { max-width: 85%; }
            .input-wrap { padding: 10px; }
        }

        .typing-indicator { display: flex; gap: 4px; padding: 8px 0; }
        .dot { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div id="auth-screen" class="overlay-screen">
        <div class="card-box">
            <div style="margin-bottom: 20px;">
                <img src="https://i.imghippo.com/files/Xcgv3652BwY.png" alt="DrukTalk Logo" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; box-shadow: 0 4px 15px rgba(0,0,0,0.4);">
            </div>
            <h2 style="font-size: 24px; font-weight: 600; margin-bottom: 8px;">Welcome to DrukTalk AI</h2>
            <p style="color: var(--text-muted); font-size: 14px;">Log in with your Google account to continue</p>
            <button class="primary-btn" onclick="login()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Continue with Google
            </button>
        </div>
    </div>

    <div id="api-modal" class="overlay-screen hidden">
        <div class="card-box">
            <h2 style="font-size: 20px; font-weight: 600; margin-bottom: 10px;">Groq API Required la</h2>
            <p style="color: var(--text-muted); font-size: 14px;">Please enter your free Groq API Key to start chatting.</p>
            <input type="password" id="groq-input" class="styled-input" placeholder="gsk_...">
            <button class="primary-btn" onclick="saveApiKey()" style="background: var(--accent); color: white;">Save Key securely</button>
            <a href="https://console.groq.com/keys" target="_blank" style="display: block; margin-top: 15px; color: var(--accent); font-size: 13px; text-decoration: none;">Get a Groq key here</a>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <img src="https://i.imghippo.com/files/Xcgv3652BwY.png" alt="Logo">
            DrukTalk AI
        </div>

        <button class="new-chat-btn" onclick="location.reload()">
            <i class="fas fa-pen"></i> New chat
        </button>
        <div style="flex: 1;"></div>
        
        <div class="nav-item" onclick="document.getElementById('api-modal').classList.remove('hidden')" style="color: var(--text-muted); font-size: 12px; margin-bottom: 5px;">
            <i class="fas fa-key"></i> Update API Key
        </div>
        <div class="nav-item" onclick="logout()" style="cursor: pointer;">
            <img id="side-profile-pic" src="" style="width: 24px; height: 24px; border-radius: 50%; display: none;"> 
            <span id="side-user-name">Log out</span>
        </div>
    </aside>

    <main class="main-container">
        
        <div class="mobile-header">
            <i class="fas fa-bars" onclick="toggleSidebar()" style="cursor: pointer; font-size: 18px;"></i>
            <img src="https://i.imghippo.com/files/Xcgv3652BwY.png" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover;">
            <span>DrukTalk AI</span>
        </div>

        <div id="chat-screen" class="screen">
            <div id="chat-feed">
                <div class="chat-content-limit" id="chat-limit-box">
                    </div>
            </div>
            
            <div class="input-wrap">
                <div class="input-box">
                    <textarea id="userInput" placeholder="Message DrukTalk AI..." rows="1" oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
                    <button id="sendBtn" onclick="sendMsg()" class="send-btn"><i class="fas fa-arrow-up"></i></button>
                </div>
                <div style="text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 10px;">
                    Powered by Groq Llama 3 • DrukTalk AI can make mistakes.
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        // Added doc, getDoc, setDoc to manage the user's specific database file
        import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCxPbybzZwn1GbzwMqJ-6zRyI7TRSKvgs0",
            authDomain: "druklink-24fa1.firebaseapp.com",
            projectId: "druklink-24fa1",
            storageBucket: "druklink-24fa1.firebasestorage.app",
            messagingSenderId: "183615496366",
            appId: "1:183615496366:web:fcfb4f88f3223044924d3f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let user = null;
        let userGroqKey = null;

        // UI Helpers
        window.autoResize = (textarea) => {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }
        window.handleEnter = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                window.sendMsg();
            }
        }
        window.toggleSidebar = () => {
            const sidebar = document.getElementById('sidebar');
            sidebar.style.left = sidebar.style.left === '0px' ? '-260px' : '0px';
        }

        // Render Messages in UI
        const feedBox = document.getElementById('chat-limit-box');
        
        function appendUserMsg(text) {
            feedBox.innerHTML += `
                <div class="msg-row user">
                    <div class="msg-bubble user">${text.replace(/\n/g, '<br>')}</div>
                </div>`;
            scrollToBottom();
        }

        function appendAIMsg(text, id = null) {
            const idAttr = id ? `id="${id}"` : "";
            feedBox.innerHTML += `
                <div class="msg-row ai" ${idAttr}>
                    <div class="ai-avatar"><img src="https://i.imghippo.com/files/Xcgv3652BwY.png" alt="AI"></div>
                    <div class="msg-bubble ai">${text.replace(/\n/g, '<br>')}</div>
                </div>`;
            scrollToBottom();
        }

        function scrollToBottom() {
            const feed = document.getElementById('chat-feed');
            feed.scrollTop = feed.scrollHeight;
        }

        // Authentication & Key Loading
        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('side-profile-pic').style.display = 'block';
                document.getElementById('side-profile-pic').src = u.photoURL;
                document.getElementById('side-user-name').innerText = "Log out (" + u.displayName.split(' ')[0] + ")";
                
                // Check if they have a saved Groq Key
                await checkAndLoadApiKey();
                loadMessages();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('api-modal').classList.add('hidden');
            }
        });

        // Database logic for API Key
        async function checkAndLoadApiKey() {
            try {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().groqKey) {
                    userGroqKey = userDoc.data().groqKey;
                } else {
                    // Show API modal if no key is found
                    document.getElementById('api-modal').classList.remove('hidden');
                }
            } catch (err) {
                console.error("Error checking key:", err);
            }
        }

        window.saveApiKey = async () => {
            const inputKey = document.getElementById('groq-input').value.trim();
            if (!inputKey) return alert("Please enter a valid key la.");
            
            try {
                // Save key to Firestore database
                await setDoc(doc(db, "users", user.uid), { groqKey: inputKey }, { merge: true });
                userGroqKey = inputKey;
                document.getElementById('api-modal').classList.add('hidden');
            } catch (err) {
                alert("Error saving key to database la.");
                console.error(err);
            }
        };

        // 🌟 THE GROQ SEND FUNCTION 🌟
        window.sendMsg = async () => {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const val = input.value.trim();
            
            if (!val || !user) return;
            
            if (!userGroqKey) {
                document.getElementById('api-modal').classList.remove('hidden');
                return;
            }

            appendUserMsg(val);
            const tempId = "thinking-" + Date.now();
            appendAIMsg('<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>', tempId);

            input.value = "";
            input.style.height = "auto";
            btn.disabled = true;

            try {
                // Groq API Endpoint
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${userGroqKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": "llama3-8b-8192", // Fast Llama 3 model on Groq
                        "messages": [
                            {"role": "system", "content": "You are DrukTalk AI from Bhutan. Answer intelligently and nicely."},
                            {"role": "user", "content": val}
                        ]
                    })
                });

                const data = await response.json();
                
                if (!response.ok || data.error) {
                    throw new Error(data.error?.message || "Invalid API response. Check if your Groq key is correct.");
                }

                const aiText = data.choices[0].message.content;

                document.getElementById(tempId).innerHTML = `<div class="ai-avatar"><img src="https://i.imghippo.com/files/Xcgv3652BwY.png" alt="AI"></div><div class="msg-bubble ai">${aiText.replace(/\n/g, '<br>')}</div>`;

                // Save Chat to Firebase
                await addDoc(collection(db, "chats"), {
                    uid: user.uid, prompt: val, response: aiText, time: serverTimestamp()
                });

            } catch (err) {
                console.error("Groq Error:", err);
                document.getElementById(tempId).innerHTML = `<div class="ai-avatar"><img src="https://i.imghippo.com/files/Xcgv3652BwY.png" alt="AI"></div><div class="msg-bubble ai" style="color:#ef4444;">Error la: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        };

        // Load Chat History
        function loadMessages() {
            const q = query(collection(db, "chats"), where("uid", "==", user.uid));
            onSnapshot(q, (snap) => {
                let msgs = [];
                snap.forEach(d => msgs.push(d.data()));
                msgs.sort((a, b) => {
                    let tA = a.time ? a.time.toMillis() : Date.now();
                    let tB = b.time ? b.time.toMillis() : Date.now();
                    return tA - tB;
                });

                feedBox.innerHTML = "";
                appendAIMsg("Kuzuzangpo la! I am DrukTalk AI. My brain is now powered by Groq Llama 3. How can I help you today?");
                
                msgs.forEach(data => {
                    appendUserMsg(data.prompt);
                    appendAIMsg(data.response);
                });
            });
        }
    </script>
</body>
</html>
