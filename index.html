<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrukLink | Bhutan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #000; --card: #121212; --border: #262626; --accent: #0095f6; --text: #fff; --sec: #a8a8a8; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; }
        .hidden { display: none !important; }
        
        /* Sidebar */
        .sidebar { width: 240px; height: 100vh; border-right: 1px solid var(--border); position: fixed; padding: 20px 12px; display: flex; flex-direction: column; background: #000; }
        .logo { font-family: 'Brush Script MT', cursive; font-size: 2.4rem; margin-bottom: 30px; padding-left: 10px; color: #fff; text-decoration: none; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px; cursor: pointer; border-radius: 8px; font-size: 1.1rem; transition: 0.2s; color: #fff; }
        .nav-item:hover { background: #1a1a1a; }
        .nav-item i { font-size: 1.4rem; width: 25px; }

        /* Content */
        main { margin-left: 240px; width: 100%; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 470px; padding: 20px; }

        /* Post Box */
        .post-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 30px; }
        textarea { width: 100%; background: transparent; color: #fff; border: none; outline: none; font-size: 1rem; resize: none; margin-bottom: 10px; }
        
        /* Post Item */
        .post { margin-bottom: 35px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .p-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .p-header img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
        .p-img { width: 100%; border-radius: 4px; border: 1px solid var(--border); object-fit: cover; max-height: 580px; }
        .p-meta { padding: 10px 0; }
        
        button { background: var(--accent); color: #fff; border: none; padding: 8px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 20px 5px; }
            .nav-text, .logo { display: none; }
            main { margin-left: 70px; }
        }
    </style>
</head>
<body>

    <div id="auth-screen" style="width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <h1 style="font-family: 'Brush Script MT', cursive; font-size: 5rem;">DrukLink</h1>
        <button onclick="login()" style="padding: 15px 40px; font-size: 1.1rem;">Kuzuzangpo - Login</button>
    </div>

    <div id="app" class="hidden" style="display: flex; width: 100%;">
        <aside class="sidebar">
            <div class="logo">DrukLink</div>
            <div class="nav-item" onclick="showScreen('home')"><i class="fas fa-home"></i><span class="nav-text">Home</span></div>
            <div class="nav-item" onclick="showScreen('explore')"><i class="fas fa-search"></i><span class="nav-text">Explore</span></div>
            <div class="nav-item" onclick="showScreen('profile')"><i class="far fa-user"></i><span class="nav-text">Profile</span></div>
            <div class="nav-item" onclick="logout()" style="margin-top: auto; color: #ff3b30;"><i class="fas fa-sign-out-alt"></i><span class="nav-text">Logout</span></div>
        </aside>

        <main>
            <div class="container">
                <div id="home-screen" class="screen">
                    <div class="post-box">
                        <textarea id="postTxt" rows="2" placeholder="What's happening in Bhutan, la?"></textarea>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <input type="file" id="postFile" accept="image/*" style="font-size: 0.8rem; width: 60%;">
                            <button id="postBtn" onclick="doUpload()">Post</button>
                        </div>
                    </div>
                    <div id="feed"></div>
                </div>
                
                <div id="explore-screen" class="screen hidden"><h2>Explore Users</h2><p style="color:var(--sec)">Discover friends across Bhutan.</p></div>
                <div id="profile-screen" class="screen hidden" style="text-align: center;">
                    <img id="uPic" style="width: 120px; border-radius: 50%; margin-top: 50px; border: 2px solid var(--border);">
                    <h2 id="uName" style="margin-top:15px;"></h2>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxPbybzZwn1GbzwMqJ-6zRyI7TRSKvgs0",
            authDomain: "druklink-24fa1.firebaseapp.com",
            projectId: "druklink-24fa1",
            storageBucket: "druklink-24fa1.firebasestorage.app",
            messagingSenderId: "183615496366",
            appId: "1:183615496366:web:fcfb4f88f3223044924d3f"
        };
        
        const BB_KEY = "b5f2098fa836fe7090138a418d294866";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let me = null;

        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (u) => {
            me = u;
            document.getElementById('auth-screen').classList.toggle('hidden', !!u);
            document.getElementById('app').classList.toggle('hidden', !u);
            if(u) {
                document.getElementById('uPic').src = u.photoURL;
                document.getElementById('uName').innerText = u.displayName;
                loadFeed();
            }
        });

        window.doUpload = async () => {
            const file = document.getElementById('postFile').files[0];
            const text = document.getElementById('postTxt').value.trim();
            const btn = document.getElementById('postBtn');

            if (!file || !text) return alert("Kuzuzangpo! Please select a photo and write a caption.");

            btn.disabled = true;
            btn.innerText = "Posting...";

            try {
                const fd = new FormData();
                fd.append("image", file);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${BB_KEY}`, { method: "POST", body: fd });
                const json = await res.json();

                if (json.success) {
                    await addDoc(collection(db, "posts"), {
                        uName: me.displayName,
                        uPic: me.photoURL,
                        img: json.data.url,
                        caption: text,
                        time: serverTimestamp()
                    });
                    document.getElementById('postFile').value = "";
                    document.getElementById('postTxt').value = "";
                }
            } catch (err) { alert("Network error, please try again la!"); }
            btn.disabled = false; btn.innerText = "Post";
        };

        function loadFeed() {
            const q = query(collection(db, "posts"), orderBy("time", "desc"));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    
                    // UNIVERSAL FALLBACKS to fix "undefined"
                    const name = data.uName || data.authorName || data.name || "User";
                    const avatar = data.uPic || data.authorPic || data.pic || "https://via.placeholder.com/32";
                    const photo = data.img || data.imageUrl || data.image;
                    const desc = data.caption || data.postText || "";

                    if (photo) {
                        feed.innerHTML += `
                            <div class="post">
                                <div class="p-header">
                                    <img src="${avatar}">
                                    <b>${name}</b>
                                </div>
                                <img src="${photo}" class="p-img">
                                <div class="p-meta">
                                    <b>${name}</b> ${desc}
                                </div>
                            </div>
                        `;
                    }
                });
            });
        }

        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id + '-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
