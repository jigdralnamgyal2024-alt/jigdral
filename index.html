<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrukLink Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #000; --card: #121212; --border: #262626; --accent: #0095f6; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; }
        .hidden { display: none !important; }
        .sidebar { width: 240px; height: 100vh; border-right: 1px solid var(--border); position: fixed; padding: 20px; }
        main { margin-left: 240px; width: 100%; display: flex; justify-content: center; }
        .content { width: 100%; max-width: 500px; padding: 20px; }
        .post-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 30px; }
        textarea { width: 100%; background: transparent; color: #fff; border: none; outline: none; margin-bottom: 10px; font-size: 1rem; }
        .post { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; }
        .post img { width: 100%; border-radius: 8px; margin-top: 10px; }
        button { background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>

    <div id="auth-screen" style="width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center;">
        <button onclick="login()" style="padding: 15px 30px;">Login with Google to Start</button>
    </div>

    <div id="app" class="hidden">
        <aside class="sidebar">
            <h1 style="font-family: cursive;">DrukLink</h1>
            <div onclick="showScreen('home')" style="cursor:pointer; margin-bottom: 20px;"><i class="fas fa-home"></i> Home</div>
            <div onclick="logout()" style="cursor:pointer; color: red;"><i class="fas fa-sign-out-alt"></i> Logout</div>
        </aside>

        <main>
            <div class="content">
                <div id="home-screen">
                    <div class="post-box">
                        <textarea id="caption" placeholder="Write something, la..."></textarea>
                        <div style="display: flex; justify-content: space-between;">
                            <input type="file" id="fileInput" accept="image/*">
                            <button id="upBtn" onclick="handleUpload()">Post</button>
                        </div>
                    </div>
                    <div id="feed"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxPbybzZwn1GbzwMqJ-6zRyI7TRSKvgs0",
            authDomain: "druklink-24fa1.firebaseapp.com",
            projectId: "druklink-24fa1",
            storageBucket: "druklink-24fa1.firebasestorage.app",
            messagingSenderId: "183615496366",
            appId: "1:183615496366:web:fcfb4f88f3223044924d3f"
        };
        
        // This is your ImgBB Key
        const BB_KEY = "b5f2098fa836fe7090138a418d294866";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                loadPosts();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app').classList.add('hidden');
            }
        });

        window.handleUpload = async () => {
            const file = document.getElementById('fileInput').files[0];
            const text = document.getElementById('caption').value;
            const btn = document.getElementById('upBtn');

            if (!file) return alert("Please select a photo first!");
            if (!text) return alert("Please write a caption!");

            btn.disabled = true;
            btn.innerText = "Uploading...";

            try {
                // Prepare form for ImgBB
                const formData = new FormData();
                formData.append("image", file);

                // Try to upload
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${BB_KEY}`, {
                    method: "POST",
                    body: formData
                });
                
                const data = await res.json();

                if (data.success) {
                    // Save to Firebase
                    await addDoc(collection(db, "posts"), {
                        name: currentUser.displayName,
                        pic: currentUser.photoURL,
                        image: data.data.url,
                        caption: text,
                        createdAt: serverTimestamp()
                    });

                    // Clear form
                    document.getElementById('fileInput').value = "";
                    document.getElementById('caption').value = "";
                    alert("Posted successfully la!");
                } else {
                    alert("ImgBB Error: " + data.error.message);
                }
            } catch (err) {
                alert("Connection Error: Check your internet or API key!");
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = "Post";
            }
        };

        function loadPosts() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snap) => {
                const feedDiv = document.getElementById('feed');
                feedDiv.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    feedDiv.innerHTML += `
                        <div class="post">
                            <div style="display:flex; align-items:center; gap:10px;">
                                <img src="${p.pic}" style="width:30px; height:30px; border-radius:50%;">
                                <b>${p.name}</b>
                            </div>
                            <img src="${p.image}">
                            <p><b>${p.name}</b> ${p.caption}</p>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
