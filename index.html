<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrukTalk AI</title>
    
    <link rel="icon" type="image/png" href="https://i.imghippo.com/files/RPD5045T.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* True ChatGPT / Gemini Modern UI - DARK MODE (Default) */
        :root {
            --sidebar-bg: #171717;
            --main-bg: #212121;
            --user-msg-bg: #2f2f2f;
            --text-main: #ececec;
            --text-muted: #9b9b9b;
            --border-color: rgba(255,255,255,0.1);
            --accent: #10a37f;
            --hover-bg: rgba(255,255,255,0.05);
        }

        /* LIGHT MODE VARIABLES */
        body.light-theme {
            --sidebar-bg: #f9f9f9;
            --main-bg: #ffffff;
            --user-msg-bg: #f4f4f4;
            --text-main: #0d0d0d;
            --text-muted: #6b6b6b;
            --border-color: rgba(0,0,0,0.1);
            --hover-bg: rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--main-bg); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; transition: background 0.3s, color 0.3s; }
        .hidden { display: none !important; }

        /* Modals & Screens */
        .overlay-screen { background: rgba(0,0,0,0.6); width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; position: absolute; z-index: 100; backdrop-filter: blur(5px); }
        .card-box { background: var(--sidebar-bg); border: 1px solid var(--border-color); padding: 30px; border-radius: 16px; text-align: left; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .card-box h2 { text-align: center; margin-bottom: 20px; font-size: 20px;}
        .close-modal { float: right; cursor: pointer; color: var(--text-muted); font-size: 18px; }
        .close-modal:hover { color: var(--text-main); }

        /* Buttons & Inputs */
        .primary-btn { width: 100%; padding: 12px; background: var(--text-main); color: var(--main-bg); border-radius: 8px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; cursor: pointer; border: none; font-size: 15px; transition: 0.2s;}
        .primary-btn:hover { opacity: 0.8; }
        .danger-btn { background: #ef4444; color: white; }
        .danger-btn:hover { background: #dc2626; opacity: 1; }
        
        .styled-input, .styled-textarea, select.styled-input { width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 15px; background: var(--main-bg); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 8px; font-size: 14px; outline: none;}
        .styled-input:focus, .styled-textarea:focus, select.styled-input:focus { border-color: var(--accent); }
        .styled-textarea { resize: vertical; min-height: 80px; font-family: inherit;}
        label { font-size: 13px; color: var(--text-muted); font-weight: 500; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar-bg); display: flex; flex-direction: column; padding: 15px 10px; flex-shrink: 0; transition: transform 0.3s ease; border-right: 1px solid var(--border-color);}
        
        /* NO CIRCLE ON LOGO */
        .sidebar-brand { padding: 5px 15px 25px; display: flex; align-items: center; gap: 12px; font-size: 18px; font-weight: 600; color: var(--text-main); }
        .sidebar-brand img { width: 32px; height: 32px; object-fit: contain; }

        .new-chat-btn { display: flex; align-items: center; gap: 10px; padding: 12px 15px; width: 100%; border-radius: 8px; cursor: pointer; background: transparent; color: var(--text-main); border: none; font-size: 14px; font-weight: 500; transition: 0.2s; text-align: left; margin-bottom: 15px;}
        .new-chat-btn:hover { background: var(--user-msg-bg); }
        
        /* History List */
        .history-label { font-size: 12px; color: var(--text-muted); padding: 10px 15px 5px; font-weight: 600; }
        .history-list { flex: 1; overflow-y: auto; margin-bottom: 10px; }
        .history-list::-webkit-scrollbar { width: 5px; }
        .history-list::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        
        .history-item { padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text-main); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: 0.2s; margin-bottom: 2px;}
        .history-item:hover { background: var(--hover-bg); }
        .history-item.active { background: var(--user-msg-bg); font-weight: 500; }
        
        /* Bottom Nav Items */
        .nav-item { padding: 10px 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; margin-bottom: 2px; color: var(--text-main); font-size: 14px;}
        .nav-item:hover { background: var(--hover-bg); }
        
        /* Main Chat Area */
        .main-container { flex: 1; display: flex; flex-direction: column; position: relative; height: 100vh; }
        .screen { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        
        #chat-feed { flex: 1; overflow-y: auto; padding: 40px 20px; display: flex; flex-direction: column; scroll-behavior: smooth; }
        .chat-content-limit { width: 100%; max-width: 768px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }

        .msg-row { display: flex; width: 100%; }
        .msg-row.user { justify-content: flex-end; }
        .msg-row.ai { justify-content: flex-start; gap: 16px; }

        .msg-bubble.user { background: var(--user-msg-bg); color: var(--text-main); padding: 10px 20px; border-radius: 20px; font-size: 16px; line-height: 1.5; max-width: 70%; word-wrap: break-word; }
        
        /* NO CIRCLE ON AVATAR */
        .ai-avatar { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; background: transparent; }
        .ai-avatar img { width: 100%; height: 100%; object-fit: contain; }
        
        .msg-bubble.ai { background: transparent; color: var(--text-main); font-size: 16px; line-height: 1.6; max-width: 85%; word-wrap: break-word; padding-top: 5px;}

        /* Input Area */
        .input-wrap { padding: 20px; width: 100%; max-width: 800px; margin: 0 auto; }
        .input-box { background: var(--user-msg-bg); border-radius: 26px; padding: 10px 15px 10px 20px; display: flex; align-items: flex-end; gap: 10px; border: 1px solid var(--border-color);}
        textarea { flex: 1; background: transparent; border: none; color: var(--text-main); outline: none; font-size: 16px; padding: 8px 0; resize: none; max-height: 200px; line-height: 1.5; min-height: 40px; font-family: inherit;}
        button.send-btn { background: var(--text-main); color: var(--main-bg); border: none; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; flex-shrink: 0; margin-bottom: 4px;}
        button.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .mobile-header { display: none; padding: 15px 20px; border-bottom: 1px solid var(--border-color); color: var(--text-main); font-weight: 600; font-size: 16px; align-items: center; gap: 15px; background: var(--sidebar-bg);}
        @media (max-width: 768px) { 
            .sidebar { position: absolute; left: -260px; z-index: 50; height: 100%; } 
            .mobile-header { display: flex; }
            .msg-bubble.user { max-width: 85%; }
            .input-wrap { padding: 10px; }
        }

        .typing-indicator { display: flex; gap: 4px; padding: 8px 0; }
        .dot { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>

    <script>
        if(localStorage.getItem("theme") === "light") {
            document.body.classList.add("light-theme");
        }
    </script>

    <div id="auth-screen" class="overlay-screen">
        <div class="card-box" style="text-align: center;">
            <div style="margin-bottom: 20px;">
                <img src="https://i.imghippo.com/files/RPD5045T.png" alt="DrukTalk Logo" style="width: 80px; height: 80px; object-fit: contain; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));">
            </div>
            <h2>Welcome to DrukTalk AI</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 10px;">Log in with your Google account</p>
            <button class="primary-btn" onclick="login()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Continue with Google
            </button>
        </div>
    </div>

    <div id="profile-modal" class="overlay-screen hidden">
        <div class="card-box">
            <i class="fas fa-times close-modal" onclick="closeModal('profile-modal')"></i>
            <h2>User Profile</h2>
            
            <label>What should DrukTalk AI call you?</label>
            <input type="text" id="profile-name" class="styled-input" placeholder="Your Name">
            
            <label>Custom Instructions (How should the AI behave?)</label>
            <textarea id="profile-persona" class="styled-textarea" placeholder="e.g., Answer in Bhutanese English. Be funny and sarcastic."></textarea>
            
            <button class="primary-btn" onclick="saveProfile()" style="background: var(--accent); color: white;">Save Profile</button>
        </div>
    </div>

    <div id="settings-modal" class="overlay-screen hidden">
        <div class="card-box">
            <i class="fas fa-times close-modal" onclick="closeModal('settings-modal')"></i>
            <h2>Settings</h2>

            <label>App Theme</label>
            <select id="settings-theme" class="styled-input" onchange="updateThemePreference(this.value)">
                <option value="dark">Dark Mode</option>
                <option value="light">Light Mode</option>
            </select>
            
            <label>Groq API Key</label>
            <input type="password" id="settings-groq-key" class="styled-input" placeholder="gsk_...">
            <button class="primary-btn" onclick="saveApiKey()" style="margin-top: 0; background: var(--accent); color: white;">Update Key</button>
            <a href="https://console.groq.com/keys" target="_blank" style="display: block; margin-top: 10px; margin-bottom: 25px; color: var(--accent); font-size: 12px; text-decoration: none;">Get a free Groq key here</a>
            
            <hr style="border: 0; border-top: 1px solid var(--border-color); margin-bottom: 20px;">
            
            <label style="color: #ef4444;">Danger Zone</label>
            <button class="primary-btn danger-btn" onclick="clearAllHistory()">
                <i class="fas fa-trash"></i> Delete All Chat History
            </button>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <img src="https://i.imghippo.com/files/RPD5045T.png" alt="Logo">
            DrukTalk AI
        </div>

        <button class="new-chat-btn" onclick="startNewChat()">
            <i class="fas fa-pen"></i> New chat
        </button>

        <div class="history-label">Past Chats</div>
        <div class="history-list" id="history-list">
            </div>
        
        <div class="nav-item" onclick="openProfileModal()">
            <i class="fas fa-user"></i> Profile
        </div>
        <div class="nav-item" onclick="openSettingsModal()">
            <i class="fas fa-cog"></i> Settings
        </div>
        <div class="nav-item" onclick="logout()" style="cursor: pointer; margin-top: 5px; border-top: 1px solid var(--border-color); border-radius: 0; padding-top: 15px;">
            <img id="side-profile-pic" src="" style="width: 24px; height: 24px; border-radius: 50%; display: none;"> 
            <span id="side-user-name">Log out</span>
        </div>
    </aside>

    <main class="main-container">
        <div class="mobile-header">
            <i class="fas fa-bars" onclick="toggleSidebar()" style="cursor: pointer; font-size: 18px;"></i>
            <img src="https://i.imghippo.com/files/RPD5045T.png" style="width: 24px; height: 24px; object-fit: contain;">
            <span>DrukTalk AI</span>
        </div>

        <div id="chat-screen" class="screen">
            <div id="chat-feed">
                <div class="chat-content-limit" id="chat-limit-box">
                    </div>
            </div>
            
            <div class="input-wrap">
                <div class="input-box">
                    <textarea id="userInput" placeholder="Message DrukTalk AI..." rows="1" oninput="autoResize(this)" onkeydown="handleEnter(event)"></textarea>
                    <button id="sendBtn" onclick="sendMsg()" class="send-btn"><i class="fas fa-arrow-up"></i></button>
                </div>
                <div style="text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 10px;">
                    Powered by Groq Llama 3.3 • DrukTalk AI can make mistakes.
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCxPbybzZwn1GbzwMqJ-6zRyI7TRSKvgs0",
            authDomain: "druklink-24fa1.firebaseapp.com",
            projectId: "druklink-24fa1",
            storageBucket: "druklink-24fa1.firebasestorage.app",
            messagingSenderId: "183615496366",
            appId: "1:183615496366:web:fcfb4f88f3223044924d3f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let user = null;
        let userProfile = { name: "", persona: "", groqKey: "", theme: "dark" };
        let currentSessionId = "session-" + Date.now();
        let allUserChats = []; 

        // --- Theme Management ---
        window.updateThemePreference = async (themeValue) => {
            if (themeValue === "light") {
                document.body.classList.add("light-theme");
            } else {
                document.body.classList.remove("light-theme");
            }
            localStorage.setItem("theme", themeValue); 
            
            if (user) {
                userProfile.theme = themeValue;
                try {
                    await setDoc(doc(db, "users", user.uid), { theme: themeValue }, { merge: true });
                } catch (e) { console.error("Could not save theme to database.", e); }
            }
        };

        // --- UI & Modal Helpers ---
        window.autoResize = (textarea) => { textarea.style.height = 'auto'; textarea.style.height = textarea.scrollHeight + 'px'; }
        window.handleEnter = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendMsg(); } }
        window.toggleSidebar = () => { const s = document.getElementById('sidebar'); s.style.left = s.style.left === '0px' ? '-260px' : '0px'; }
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
        
        window.openSettingsModal = () => {
            document.getElementById('settings-groq-key').value = userProfile.groqKey || "";
            document.getElementById('settings-theme').value = userProfile.theme || localStorage.getItem("theme") || "dark";
            document.getElementById('settings-modal').classList.remove('hidden');
        }

        window.openProfileModal = () => {
            document.getElementById('profile-name').value = userProfile.name || user.displayName;
            document.getElementById('profile-persona').value = userProfile.persona || "";
            document.getElementById('profile-modal').classList.remove('hidden');
        }

        // --- Chat Rendering Logic ---
        const feedBox = document.getElementById('chat-limit-box');
        
        function appendUserMsg(text) {
            feedBox.innerHTML += `<div class="msg-row user"><div class="msg-bubble user">${text.replace(/\n/g, '<br>')}</div></div>`;
            scrollToBottom();
        }

        function appendAIMsg(text, id = null) {
            // UPDATED NEW IMAGE LINK FOR AVATAR
            feedBox.innerHTML += `<div class="msg-row ai" ${id ? `id="${id}"` : ""}><div class="ai-avatar"><img src="https://i.imghippo.com/files/RPD5045T.png"></div><div class="msg-bubble ai">${text.replace(/\n/g, '<br>')}</div></div>`;
            scrollToBottom();
        }

        function scrollToBottom() { const feed = document.getElementById('chat-feed'); feed.scrollTop = feed.scrollHeight; }

        window.startNewChat = () => {
            currentSessionId = "session-" + Date.now();
            renderActiveSession();
        };

        window.loadSession = (sessionId) => {
            currentSessionId = sessionId;
            renderActiveSession();
            if(window.innerWidth <= 768) toggleSidebar(); 
        };

        // --- Firebase Auth & User Data ---
        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('side-profile-pic').style.display = 'block';
                document.getElementById('side-profile-pic').src = u.photoURL;
                document.getElementById('side-user-name').innerText = "Log out";
                
                await loadUserProfile();
                listenToChats();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        });

        async function loadUserProfile() {
            try {
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    userProfile = { ...userProfile, ...docSnap.data() };
                    
                    if (userProfile.theme) {
                        document.getElementById('settings-theme').value = userProfile.theme;
                        updateThemePreference(userProfile.theme);
                    }
                }
                if (!userProfile.groqKey) openSettingsModal(); 
            } catch (e) { console.error("Error loading profile:", e); }
        }

        window.saveProfile = async () => {
            const name = document.getElementById('profile-name').value.trim();
            const persona = document.getElementById('profile-persona').value.trim();
            try {
                await setDoc(doc(db, "users", user.uid), { name, persona }, { merge: true });
                userProfile.name = name;
                userProfile.persona = persona;
                closeModal('profile-modal');
                alert("Profile saved successfully la!");
            } catch (err) { alert("Error saving profile."); }
        };

        window.saveApiKey = async () => {
            const key = document.getElementById('settings-groq-key').value.trim();
            if (!key) return alert("Please enter a valid key la.");
            try {
                await setDoc(doc(db, "users", user.uid), { groqKey: key }, { merge: true });
                userProfile.groqKey = key;
                closeModal('settings-modal');
                alert("API Key updated securely!");
            } catch (err) { alert("Error saving API key."); }
        };

        window.clearAllHistory = async () => {
            if (!confirm("Are you sure you want to delete ALL chat history? This cannot be undone la!")) return;
            try {
                for (let chat of allUserChats) {
                    await deleteDoc(doc(db, "chats", chat.docId));
                }
                startNewChat();
                closeModal('settings-modal');
            } catch (e) { alert("Error clearing history la."); }
        }

        // --- Fetching & Organizing History ---
        function listenToChats() {
            const q = query(collection(db, "chats"), where("uid", "==", user.uid));
            onSnapshot(q, (snap) => {
                let msgs = [];
                snap.forEach(d => msgs.push({ docId: d.id, ...d.data() }));
                msgs.sort((a, b) => (a.time ? a.time.toMillis() : Date.now()) - (b.time ? b.time.toMillis() : Date.now()));
                
                allUserChats = msgs;
                buildSidebarHistory();
                renderActiveSession();
            });
        }

        function buildSidebarHistory() {
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = "";
            
            let sessions = {};
            allUserChats.forEach(msg => {
                let sId = msg.sessionId || "old-legacy-chat"; 
                if (!sessions[sId]) sessions[sId] = msg.prompt; 
            });

            Object.keys(sessions).reverse().forEach(sId => {
                const title = sessions[sId].length > 25 ? sessions[sId].substring(0, 25) + "..." : sessions[sId];
                const isActive = (sId === currentSessionId) ? "active" : "";
                historyList.innerHTML += `<div class="history-item ${isActive}" onclick="loadSession('${sId}')"><i class="far fa-comment-alt" style="margin-right: 8px;"></i> ${title}</div>`;
            });
        }

        function renderActiveSession() {
            feedBox.innerHTML = "";
            let currentName = userProfile.name || user?.displayName?.split(' ')[0] || "friend";
            appendAIMsg(`Kuzuzangpo la, ${currentName}! How can DrukTalk AI help you today?`);
            
            const sessionMsgs = allUserChats.filter(m => (m.sessionId || "old-legacy-chat") === currentSessionId);
            sessionMsgs.forEach(data => {
                appendUserMsg(data.prompt);
                appendAIMsg(data.response);
            });
            buildSidebarHistory(); 
        }

        // --- THE AI SEND FUNCTION ---
        window.sendMsg = async () => {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const val = input.value.trim();
            
            if (!val || !user) return;
            if (!userProfile.groqKey) return openSettingsModal();

            appendUserMsg(val);
            const tempId = "thinking-" + Date.now();
            appendAIMsg('<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>', tempId);

            input.value = "";
            input.style.height = "auto";
            btn.disabled = true;

            const userName = userProfile.name || user.displayName;
            let systemInstruction = `You are DrukTalk AI from Bhutan. You are talking to a user named ${userName}. Answer intelligently.`;
            if (userProfile.persona) {
                systemInstruction += ` You MUST strictly follow these custom instructions: ${userProfile.persona}`;
            }

            let messagesPayload = [{"role": "system", "content": systemInstruction}];
            const sessionMsgs = allUserChats.filter(m => (m.sessionId || "old-legacy-chat") === currentSessionId);
            sessionMsgs.forEach(m => {
                messagesPayload.push({"role": "user", "content": m.prompt});
                messagesPayload.push({"role": "assistant", "content": m.response});
            });
            messagesPayload.push({"role": "user", "content": val});

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${userProfile.groqKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "model": "llama-3.3-70b-versatile",
                        "messages": messagesPayload
                    })
                });

                const data = await response.json();
                if (!response.ok || data.error) throw new Error(data.error?.message || "Invalid API response.");
                const aiText = data.choices[0].message.content;

                // UPDATED NEW IMAGE LINK FOR AVATAR
                document.getElementById(tempId).innerHTML = `<div class="ai-avatar"><img src="https://i.imghippo.com/files/RPD5045T.png" alt="AI"></div><div class="msg-bubble ai">${aiText.replace(/\n/g, '<br>')}</div>`;

                await addDoc(collection(db, "chats"), {
                    uid: user.uid, 
                    sessionId: currentSessionId, 
                    prompt: val, 
                    response: aiText, 
                    time: serverTimestamp()
                });

            } catch (err) {
                console.error("Groq Error:", err);
                // UPDATED NEW IMAGE LINK FOR AVATAR
                document.getElementById(tempId).innerHTML = `<div class="ai-avatar"><img src="https://i.imghippo.com/files/RPD5045T.png" alt="AI"></div><div class="msg-bubble ai" style="color:#ef4444;">Error la: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
